     ============================================================ */
  :root{

    --ink:#23201b;
    --muted:#8d8475;
    --hair:#efe7d9;

<script>
/* ---------- 种子随机 ---------- */
function rng(seed){let a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---------- 暖色 GIS 城市地图（程序化 SVG） ---------- */
function gisMap(seed,w,h){
  const r=rng(seed),R=(a,b)=>a+(b-a)*r();
  const hue=R(21,33);
  const land =`hsl(${hue} ${R(60,72)}% ${R(56,63)}%)`;
  const land2=`hsl(${hue} ${R(62,76)}% ${R(47,54)}%)`;
  const land3=`hsl(${hue+6} ${R(55,68)}% ${R(64,70)}%)`;
  const water=`hsl(${R(36,44)} ${R(36,46)}% ${R(89,93)}%)`;
  const road =`hsl(${hue-5} ${R(62,74)}% ${R(33,39)}%)`;
  let s=`<svg class="map" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<rect width="${w}" height="${h}" fill="${water}"/>`;
  s+=`<rect width="${w}" height="${h}" fill="${land}"/>`;

  // 密集街区：网格单元里塞深浅不一的色块
  const gx=Math.round(R(8,12)),gy=Math.round(R(10,15)),cw=w/gx,ch=h/gy;
  for(let i=0;i<gx;i++)for(let j=0;j<gy;j++){
    if(r()<.28)continue;
    const pad=R(.4,1.5),x=i*cw+pad,y=j*ch+pad;
    const t=r(),c=t<.4?land2:t<.7?land3:land;
    s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(cw-pad*2).toFixed(1)}" height="${(ch-pad*2).toFixed(1)}" fill="${c}" opacity="${R(.55,1).toFixed(2)}" rx="${R(0,1).toFixed(1)}"/>`;
  }
  // 次级街道：浅色细网格
  s+=`<g stroke="${water}" stroke-width="${R(1,1.7).toFixed(1)}" opacity=".85">`;
  for(let i=1;i<gx;i++){const x=(i*cw+R(-2,2)).toFixed(1);s+=`<line x1="${x}" y1="0" x2="${x}" y2="${h}"/>`;}
  for(let j=1;j<gy;j++){const y=(j*ch+R(-2,2)).toFixed(1);s+=`<line x1="0" y1="${y}" x2="${w}" y2="${y}"/>`;}
  s+=`</g>`;
  // 主干道：粗、深、斜向 + 一条环
  s+=`<g stroke="${road}" stroke-width="${R(2.6,3.8).toFixed(1)}" fill="none" stroke-linecap="round" opacity=".9">`;
  const arts=Math.round(R(3,5));
  for(let k=0;k<arts;k++){const x0=R(0,w),x1=R(0,w),mx=R(0,w),my=R(.3,.7)*h;
    s+=`<path d="M${x0.toFixed(0)} 0 Q${mx.toFixed(0)} ${my.toFixed(0)} ${x1.toFixed(0)} ${h}"/>`;}
  const ry=R(.35,.6)*h;
  s+=`<path d="M0 ${ry.toFixed(0)} Q${(w/2).toFixed(0)} ${(ry+R(-30,30)).toFixed(0)} ${w} ${(ry+R(-20,20)).toFixed(0)}"/></g>`;
  // 水体：海湾 + 河（盖最上层，水面无街道）
  const bc=Math.floor(r()*4),bx=bc%2?w:0,by=bc<2?0:h;
  s+=`<path d="M${bx} ${by} C ${bx+(bx?-1:1)*R(.2,.45)*w} ${by+(by?-1:1)*R(.05,.2)*h}, ${bx+(bx?-1:1)*R(.05,.2)*w} ${by+(by?-1:1)*R(.25,.5)*h}, ${bx} ${by+(by?-1:1)*R(.45,.7)*h} Z" fill="${water}"/>`;
  if(r()<.75){const rx=R(.2,.8)*w;
    s+=`<path d="M${rx.toFixed(0)} 0 C ${(rx+R(-40,40)).toFixed(0)} ${(h*.35).toFixed(0)}, ${(rx+R(-50,50)).toFixed(0)} ${(h*.6).toFixed(0)}, ${(rx+R(-30,30)).toFixed(0)} ${h}" stroke="${water}" stroke-width="${R(6,12).toFixed(0)}" fill="none" stroke-linecap="round"/>`;}
  // 暗角 → 成图质感
  s+=`<rect width="${w}" height="${h}" fill="url(#v${seed})"/><defs><radialGradient id="v${seed}" cx="50%" cy="42%" r="78%"><stop offset="58%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#3a2410" stop-opacity=".16"/></radialGradient></defs></svg>`;
  return s;
}

];
const star=n=>"★".repeat(n)+"☆".repeat(5-n);
const heart=`<svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 17s-6.5-4.2-8.5-8C.2 6.3 1.6 3.5 4.4 3.5c1.8 0 2.9 1 3.6 2 .7-1 1.8-2 3.6-2 2.8 0 4.2 2.8 2.9 5.5C16.5 12.8 10 17 10 17z"/></svg>`;
const avaColors=["#e8704f","#5b8def","#56b97a","#c061c9","#e0a93b"];

/* ---------- 渲染 feed ---------- */
const cols=document.getElementById('cols');
cities.forEach((c,i)=>{
  const w=c.hero?360:180;
  const div=document.createElement('div');
  div.className='card'+(c.hero?' hero':'');
  div.innerHTML=(c.hero?`<div class="tagrow"><span class="tag"># 看图猜城市 挑战赛</span></div>`:'')
    +gisMap(c.seed,w,c.h)
    +`<div class="body">
        <div class="ttl">看图猜城市丨${c.cn} <span class="stars" style="color:var(--gold)">${star(c.star)}</span></div>
        <div class="meta"><div class="who"><div class="ava">S</div><span>Sherry</span></div>
          <div class="like">${heart}${c.likes}</div></div>
      </div>`;
  div.addEventListener('click',()=>openPost(i));
  cols.appendChild(div);
});

/* ---------- 详情帖 ---------- */
const post=document.getElementById('post');
function openPost(i){
  const c=cities[i];
  document.getElementById('stage').querySelectorAll('.map').forEach(m=>m.remove());
  document.getElementById('stage').insertAdjacentHTML('afterbegin',gisMap(c.seed,375,375));
  document.getElementById('ptitle').innerHTML=`看图猜城市丨第 ${i+1} 关 <span class="stars">${star(c.star)}</span>`;
  document.getElementById('pcap').textContent=c.cap;
  document.getElementById('ans').textContent="✅ 答案："+c.ans;
  const rv=document.getElementById('reveal');rv.classList.remove('shown');
  document.getElementById('tags').innerHTML=["#arcgispro","#GIS绘图","#看图猜城市",...c.tags].map(t=>`<a>${t}</a>`).join("");
  document.getElementById('pinfo').textContent=`难度 ${star(c.star)} · 编辑于 6 月 26 日`;
  document.getElementById('likenum').textContent=c.likes;
  document.getElementById('savenum').textContent=c.saves;
  document.getElementById('cmtnum').textContent=c.cmt;
  document.getElementById('cmtcount').textContent=`共 ${c.cmt} 条评论`;
  document.getElementById('cmtlist').innerHTML=c.cmts.map(([a,n,t,l])=>
    `<div class="cmt"><div class="ca" style="background:${avaColors[(a.charCodeAt(0))%5]}">${a}</div>
      <div class="cb"><div class="cn">${n}</div><div class="ct">${t}</div><div class="cl">${l} 赞 · 回复</div></div></div>`).join("");
  document.getElementById('likebtn').classList.remove('liked');
  post.classList.add('open');
}
document.getElementById('back').addEventListener('click',()=>post.classList.remove('open'));
document.getElementById('reveal').addEventListener('click',function(){this.classList.toggle('shown');});
document.getElementById('likebtn').addEventListener('click',function(){this.classList.toggle('liked');});
</script>
</body>
</html>
