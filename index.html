<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.svg" />
    <meta
      name="theme-color"
      content="#f2f2f7"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#16161a"
      media="(prefers-color-scheme: dark)"
    />
    <script>
      // set theme before first paint (no flash)
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "dark" && t !== "light")
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <title>Sherry (Ke) Shi · Data Scientist</title>
    <meta
      name="description"
      content="Sherry (Ke) Shi · Data Scientist in Toronto. Real-time machine learning for fraud and risk."
    />
    <!-- 社交分享卡片(Open Graph / Twitter):分享到 LinkedIn / 微信 / iMessage / Slack 时显示标题与简介 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sherry (Ke) Shi · Data Scientist" />
    <meta
      property="og:description"
      content="Sherry (Ke) Shi · Data Scientist in Toronto. Real-time machine learning for fraud and risk."
    />
    <meta property="og:site_name" content="Sherry (Ke) Shi" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sherry (Ke) Shi · Data Scientist" />
    <meta
      name="twitter:description"
      content="Sherry (Ke) Shi · Data Scientist in Toronto. Real-time machine learning for fraud and risk."
    />
    <!-- 部署后补:og:url 与 og:image(绝对 URL,建议 1200×630 PNG) -->
    <!-- 系统字体（Apple HIG）：Mac 上即 San Francisco，无需外部字体 -->
    <style>
      /* ============================================================
         Apple Human Interface Guidelines · visual skin
         规则来源：HIG — Materials(透明度) / Elevation(层级) / Buttons
         强调色 = 品牌红（印章红，对齐 footprints 古海图）；其余走苹果中性 + 不透明度分级
         ============================================================ */
      :root {
        --bg: #f3f0e8;                    /* 暖化的浅底（降「纯白刺眼」+ 配红金）*/
        --card: #fdfbf5;                 /* 暖白卡片（非纯白，柔和不晃眼；仍亮于 --bg）*/
        --ink: #1c1c1e;                  /* label */
        --muted: rgba(60, 60, 67, 0.75); /* secondaryLabel · 调至 ≥4.5:1 (WCAG AA) */
        --faint: rgba(60, 60, 67, 0.3);  /* tertiaryLabel */
        --line: rgba(60, 60, 67, 0.16);  /* separator */
        --fill: rgba(120, 120, 128, 0.12);   /* tertiarySystemFill */
        --fill-2: rgba(120, 120, 128, 0.16); /* secondarySystemFill */
        --accent: #9b2d20;               /* 印章红 = app tint（对齐 footprints 古海图）*/
        --accent-ink: #7d2017;
        --accent-soft: rgba(155, 45, 32, 0.1);
        --material: rgba(243, 240, 232, 0.85); /* nav material：RGB 对齐 --bg，导航融入背景不露色差；0.85+毛玻璃仍防滚动内容透出 */
        --radius: 16px;
        --radius-sm: 10px;
        --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-hover: 0 8px 24px -8px rgba(0, 0, 0, 0.16);
        /* 字号阶梯 type scale（对齐 Apple 体系，消除零散/小数字号）*/
        --fs-display: clamp(40px, 7vw, 64px); /* Hero */
        --fs-title2: 22px;   /* Lead 段 */
        --fs-title3: 20px;   /* Hero 副文案 */
        --fs-headline: 17px; /* 卡片标题 */
        --fs-body: 16px;     /* 正文 */
        --fs-callout: 15px;  /* 描述 */
        --fs-subhead: 14px;  /* 次要描述 */
        --fs-footnote: 13px; /* 标签/眉头/时间 */
        --fs-caption: 12px;  /* 元信息 */
      }
      [data-theme="dark"] {
        /* 暗色规范(Material/HIG)：① 不用纯黑 ② 海拔=更亮的表面
           ③ 文字按不透明度分级 ④ 强调色去饱和 ⑤ 柔和阴影表达层级 */
        --bg: #16161a;                      /* 基础表面：深灰，非纯黑 */
        --card: #1f1f24;                    /* +1 海拔：比底更亮 */
        --ink: rgba(255, 255, 255, 0.92);   /* 高强调 */
        --muted: rgba(255, 255, 255, 0.58); /* 中强调 */
        --faint: rgba(255, 255, 255, 0.38); /* 低强调 */
        --line: rgba(255, 255, 255, 0.1);
        --fill: rgba(255, 255, 255, 0.07);
        --fill-2: rgba(255, 255, 255, 0.11);
        --accent: #d9694e;                  /* 提亮去饱和的印章红 */
        --accent-ink: #e58a72;
        --accent-soft: rgba(217, 105, 78, 0.18);
        --material: rgba(22, 22, 26, 0.85); /* 导航材质（够实，内容不透出来糊在一起）*/
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-hover: 0 12px 30px -10px rgba(0, 0, 0, 0.7);
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        background: var(--bg);
        transition: background-color 0.3s ease;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 16px;
        line-height: 1.5;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      #app {
        max-width: 840px;
        margin: 0 auto;
        padding: 0 26px 72px;
      }
      a {
        color: inherit;
      }
      a:focus-visible,
      button:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 2px;
        border-radius: 6px;
      }
      ::selection {
        background: var(--accent-soft);
      }
      /* 无障碍:跳过导航直达主内容(平时移出视口,键盘 Tab 聚焦时滑入) */
      .skip-link {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 100;
        padding: 10px 16px;
        background: var(--accent);
        color: #fff;
        font-family: var(--sans);
        font-size: var(--fs-subhead);
        font-weight: 600;
        text-decoration: none;
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-hover);
        transform: translateY(-200%);
        transition: transform 0.18s ease;
      }
      .skip-link:focus {
        transform: translateY(0);
      }
      #top {
        outline: none;
      }

      /* ---- nav: Apple material (translucent + blur) ---- */
      .nav {
        position: sticky;
        top: 0;
        z-index: 30;
        background: var(--material);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        backdrop-filter: saturate(180%) blur(20px);
        /* 不画分隔线:导航底色已等于页面背景,无缝融入(滚动时靠毛玻璃自然过渡) */
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 13px 0;
        flex-wrap: wrap;
        gap: 10px;
        transition: background-color 0.3s ease;
      }
      .brand {
        font-weight: 600;
        font-size: var(--fs-body);
        letter-spacing: -0.02em;
        text-decoration: none;
        color: var(--accent);
        transition: color 0.18s;
      }
      .brand:hover {
        color: var(--accent-ink);
      }
      .navlinks {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
      }
      .navlinks a {
        font-size: var(--fs-footnote);
        font-weight: 500;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.18s;
      }
      .navlinks a:hover {
        color: var(--accent);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .theme-toggle {
        background: none;
        border: 0;
        padding: 4px;
        cursor: pointer;
        color: var(--muted);
        display: inline-flex;
        flex: none;
        transition: color 0.18s;
      }
      .theme-toggle:hover {
        color: var(--accent);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-toggle .ic-sun {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .ic-moon {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .ic-sun {
        display: inline;
      }
      @media (max-width: 700px) {
        .nav {
          gap: 14px;
        }
        .brand {
          flex: none;
        }
        .nav-right {
          flex: 1;
          min-width: 0;
          gap: 10px;
        }
        .navlinks {
          flex: 1;
          min-width: 0;
          flex-wrap: wrap;
          gap: 2px 16px;
        }
        /* 触摸热区（HIG ~44pt）：加内边距撑大可点区域，文字/图标不变。
           9 链接窄屏折行，nav 链接取 ~38px 折中（全 44 会让导航过高）；钮/按钮足 44。 */
        .navlinks a {
          white-space: nowrap;
          padding: 9px 0;
        }
        .theme-toggle {
          padding: 13px;
        }
        button.show-all-btn {
          padding: 12px 0;
          margin-top: 6px;
        }
      }

      /* ---- hero ---- */
      .hero {
        padding: 56px 0 48px;
      }
      .kicker {
        font-size: var(--fs-footnote);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 18px;
      }
      .hero-title {
        font-weight: 700;
        font-size: var(--fs-display);
        line-height: 1.04;
        letter-spacing: -0.03em;
        margin: 0 0 20px;
      }
      .hero-lead {
        font-size: var(--fs-title3);
        color: var(--muted);
        max-width: 50ch;
        margin: 0 0 28px;
        text-wrap: pretty;
      }
      .hero-lead b {
        color: var(--ink);
        font-weight: 600;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      /* Apple "gray" button → capsule, fill bg, label text */
      .lnk {
        font-size: var(--fs-callout);
        font-weight: 600;
        text-decoration: none;
        padding: 9px 18px;
        border-radius: 980px;
        background: var(--fill-2);
        color: var(--ink);
        border: none;
        transition: background 0.18s, color 0.18s, transform 0.1s;
      }
      .lnk:hover {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .lnk:active {
        transform: scale(0.97);
      }

      /* ---- sections: Apple grouped-list header ---- */
      .block {
        padding: 40px 0;
        scroll-margin-top: 110px;
      }
      .block.compact {
        padding: 32px 0 8px;
      }
      .block-h {
        font-size: var(--fs-footnote);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 20px;
      }
      .prose .lead {
        font-size: var(--fs-title2);
        font-weight: 600;
        line-height: 1.34;
        letter-spacing: -0.02em;
        margin: 0 0 16px;
        color: var(--ink);
        text-wrap: balance;
      }
      .prose p {
        margin: 0 0 14px;
        color: var(--muted);
        text-wrap: pretty;
      }
      .prose p:last-child {
        margin: 0;
      }

      /* ---- cards: Apple inset-grouped (flat, hairline, subtle elevation) ---- */
      .items {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 14px;
      }
      .item {
        display: block;
        color: inherit;
        text-decoration: none;
        background: var(--card);
        border: 0.5px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 24px;
        box-shadow: var(--shadow);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .item:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
      }
      .item:hover .item-t {
        color: var(--accent);
      }
      a.item .item-t::after {
        content: "↗";
        font-size: 0.78em;
        color: var(--faint);
        margin-left: 7px;
        transition: color 0.18s;
      }
      a.item:hover .item-t::after {
        color: var(--accent);
      }
      .is-extra {
        display: none;
      }
      .items.show-all .is-extra {
        display: block;
      }
      /* Apple plain/text button */
      .show-all-btn {
        margin-top: 18px;
        background: none;
        border: 0;
        padding: 0;
        cursor: pointer;
        font-family: var(--sans);
        font-size: var(--fs-subhead);
        font-weight: 600;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .show-all-btn:hover {
        color: var(--accent-ink);
      }
      .item-h {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 14px;
        flex-wrap: wrap;
      }
      .item-t {
        font-weight: 600;
        font-size: var(--fs-headline);
        letter-spacing: -0.02em;
        transition: color 0.18s;
      }
      .item-t .role {
        color: var(--muted);
        font-weight: 400;
      }
      .item-when {
        font-size: var(--fs-footnote);
        color: var(--faint);
        font-weight: 500;
        white-space: nowrap;
      }
      /* Apple systemOrange tint badge */
      .todo-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #b25000;
        background: rgba(255, 149, 0, 0.15);
        border: none;
        border-radius: 5px;
        padding: 2px 6px;
        margin-right: 8px;
        vertical-align: middle;
      }
      [data-theme="dark"] .todo-badge {
        color: #ff9f0a;
        background: rgba(255, 159, 10, 0.18);
      }
      .item-meta {
        font-size: var(--fs-footnote);
        color: var(--accent);
        font-weight: 600;
        margin: 8px 0 0;
      }
      .item-desc {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: var(--fs-callout);
        line-height: 1.55;
        text-wrap: pretty;
      }

      /* ---- repos ---- */
      .repos {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .repos a {
        display: flex;
        flex-direction: column;
        height: 100%;
        text-decoration: none;
        background: var(--card);
        border: 0.5px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 20px;
        box-shadow: var(--shadow);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .repos a:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
      }
      .repos a:hover .repo-t {
        color: var(--accent);
      }
      .repo-t {
        font-weight: 600;
        font-size: var(--fs-headline);
        margin-bottom: 6px;
        letter-spacing: -0.01em;
        transition: color 0.18s;
      }
      .repo-d {
        color: var(--muted);
        font-size: var(--fs-subhead);
        line-height: 1.5;
        flex: 1;
      }
      .repo-meta {
        margin-top: 12px;
        font-size: var(--fs-caption);
        font-weight: 600;
        color: var(--faint);
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }
      .repo-meta .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }
      .more {
        display: inline-block;
        margin-top: 18px;
        font-weight: 600;
        font-size: var(--fs-callout);
        color: var(--accent);
        text-decoration: none;
      }
      .more:hover {
        color: var(--accent-ink);
      }
      .ar {
        display: inline-block;
        transition: transform 0.18s;
      }
      .more:hover .ar,
      .fp:hover .ar {
        transform: translateX(3px);
      }

      /* ---- skills: group header + fill chips ---- */
      .skills {
        margin: 0;
        display: grid;
        gap: 10px;
      }
      .skill {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 16px;
        align-items: start;
      }
      .skill dt {
        font-size: var(--fs-caption);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--muted);
        padding-top: 5px;
      }
      .skill dd {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .tag {
        font-size: var(--fs-footnote);
        font-weight: 500;
        color: var(--ink);
        background: var(--fill);
        border: none;
        border-radius: 8px;
        padding: 5px 11px;
        line-height: 1.2;
      }

      /* ---- certs: list rows w/ hairline separators ---- */
      .certs {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px 36px;
      }
      .cert {
        display: flex;
        flex-direction: column;
        gap: 2px;
        text-decoration: none;
        padding: 11px 0;
        border-bottom: 0.5px solid var(--line);
      }
      .cert-name {
        font-size: var(--fs-callout);
        font-weight: 500;
        color: var(--ink);
        transition: color 0.18s;
      }
      .cert:hover .cert-name {
        color: var(--accent);
      }
      .cert-meta {
        font-size: var(--fs-caption);
        color: var(--faint);
      }
      @media (max-width: 620px) {
        .certs {
          grid-template-columns: 1fr;
        }
      }

      /* ---- footprints card ---- */
      .fp {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        text-decoration: none;
        background: var(--card);
        border: 0.5px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 22px;
        box-shadow: var(--shadow);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .fp:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
      }
      .fp:hover .fp-title {
        color: var(--accent);
      }
      .fp-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .fp-title {
        font-weight: 600;
        font-size: var(--fs-headline);
        letter-spacing: -0.01em;
        color: var(--ink);
        transition: color 0.18s;
      }
      .fp-meta {
        font-size: var(--fs-caption);
        color: var(--muted);
      }

      .foot {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        padding-top: 30px;
        color: var(--faint);
        font-size: var(--fs-footnote);
        font-weight: 500;
      }
      @media (max-width: 620px) {
        .repos,
        .skill {
          grid-template-columns: 1fr;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *,
        *::before,
        *::after {
          transition: none !important;
          animation: none !important;
          scroll-behavior: auto !important;
        }
      }
      /* ---- 打印 / 存 PDF:简历应干净完整(白底黑字、去掉屏幕专属控件、展开折叠) ---- */
      @media print {
        /* 即便用户在暗色下打印,也强制浅色省墨清晰 */
        :root,
        [data-theme="dark"] {
          --bg: #fff;
          --card: #fff;
          --ink: #1c1c1e;
          --muted: rgba(60, 60, 67, 0.78);
          --faint: rgba(60, 60, 67, 0.4);
          --line: rgba(60, 60, 67, 0.22);
          --fill: rgba(120, 120, 128, 0.1);
          --fill-2: rgba(120, 120, 128, 0.14);
          --accent: #1a5740;
          --accent-ink: #1a5740;
          --accent-soft: rgba(31, 99, 71, 0.1);
          --material: #fff;
          --shadow: none;
          --shadow-hover: none;
        }
        body {
          background: #fff;
        }
        * {
          box-shadow: none !important;
        }
        /* 屏幕专属控件在纸面无意义 */
        .nav,
        .theme-toggle,
        .fp,
        .show-all-btn {
          display: none !important;
        }
        /* 折叠的经历 / 项目在打印时全展开 */
        .is-extra {
          display: block !important;
        }
        /* 卡片 / 分区尽量不被分页切断 */
        .card,
        section,
        .item {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#top">Skip to content</a>
    <div id="app"></div>
    <script src="profile/data.js"></script>
    <script>
      const P = window.PROFILE;
      if (!P) {
        document.getElementById("app").innerHTML =
          '<main style="max-width:640px;margin:90px auto;padding:0 26px;font-family:system-ui,sans-serif;color:#1b1c20">' +
          '<h1 style="font-size:34px;margin:0 0 12px">Sherry (Ke) Shi</h1>' +
          '<p style="color:#6b6f78;line-height:1.6">Data Scientist · Toronto. The page didn’t load fully. Reach me directly:</p>' +
          '<p><a href="mailto:keshi0330@gmail.com">keshi0330@gmail.com</a> &nbsp;·&nbsp; ' +
          '<a href="https://github.com/kkkkshi">GitHub</a> &nbsp;·&nbsp; ' +
          '<a href="https://www.linkedin.com/in/keshi0330/">LinkedIn</a></p></main>';
        throw new Error("PROFILE data unavailable");
      }
      document.title = P.name + " · " + P.role;
      const _meta = document.querySelector('meta[name="description"]');
      if (_meta) _meta.setAttribute("content", P.tagline);

      const E = (s) =>
        String(s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      const LABEL = {
        email: "Email",
        github: "GitHub",
        linkedin: "LinkedIn",
        resume: "Résumé",
      };
      const linkrow = (keys) =>
        keys
          .filter((k) => P.links[k])
          .map((k) => {
            const href = k === "email" ? "mailto:" + P.email : P.links[k];
            const ext = k === "email" ? "" : ' target="_blank" rel="noopener"';
            return `<a class="lnk" href="${E(href)}"${ext}>${LABEL[k]}</a>`;
          })
          .join("");
      const _ti = P.tagline.indexOf(". ");
      const tagline =
        _ti > 0
          ? `<b>${E(P.tagline.slice(0, _ti))}</b>${E(P.tagline.slice(_ti))}`
          : E(P.tagline);

      const itemList = (arr, kind) =>
        `<ul class="items">${arr
          .map((e) => {
            const title =
              kind === "work"
                ? `${E(e.company)} <span class="role">· ${E(e.role)}</span>`
                : E(e.school || e.name);
            const meta =
              kind === "edu"
                ? `${E(e.degree)} · ${E(e.note)}`
                : `${E(e.project || e.sub)} · ${
                    e.stack ? e.stack.map(E).join(" · ") : ""
                  }`;
            const body = (e.bullets || [])
              .map((b) => `<p class="item-desc">${E(b)}</p>`)
              .join("");
            const url =
              e.url ||
              (kind === "proj" && e.repo
                ? `https://github.com/${P.githubUser}/${e.repo}`
                : "");
            const inner = `<div class="item-h"><span class="item-t">${title}</span><span class="item-when">${
              e.todo ? '<span class="todo-badge">TODO</span>' : ""
            }${E(e.period)}</span></div><p class="item-meta">${meta}</p>${body}`;
            const label =
              E(e.company || e.school || e.name || "") +
              (e.role ? " · " + E(e.role) : "");
            const isExtra =
              (kind === "work" && /Intern|Assistant/i.test(e.role || "")) ||
              (kind === "proj" && !e.featured);
            const liClass = isExtra ? ' class="is-extra"' : "";
            return `<li${liClass}>${
              url
                ? `<a class="item" href="${E(
                    url,
                  )}" target="_blank" rel="noopener" aria-label="${label}">${inner}</a>`
                : `<div class="item">${inner}</div>`
            }</li>`;
          })
          .join("")}</ul>`;

      document.getElementById("app").innerHTML = `
      <header class="nav">
        <a href="#top" class="brand">${E(P.name)}</a>
        <div class="nav-right">
          <nav class="navlinks">
            <a href="#about">About</a><a href="#now">Now</a><a href="#experience">Experience</a><a href="#education">Education</a><a href="#projects">Projects</a><a href="#publications">Papers</a><a href="#certifications">Certs</a><a href="#skills">Skills</a><a href="#map">Footprints</a>
          </nav>
          <button type="button" class="theme-toggle" aria-label="Toggle dark mode">
            <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
            <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
        </div>
      </header>
      <main id="top" tabindex="-1">
        <section class="hero">
          <p class="kicker">${E(P.role)} · ${E(P.location)}</p>
          <h1 class="hero-title">${E(P.name)}</h1>
          <p class="hero-lead">${tagline}</p>
          <div class="links">${linkrow(["email", "github", "linkedin", "resume"])}</div>
        </section>

        <section class="block" id="about">
          <h2 class="block-h">About</h2>
          <div class="prose">
            <p class="lead">${E(P.about[0])}</p>
            ${P.about
              .slice(1)
              .map((p) => `<p>${E(p)}</p>`)
              .join("")}
          </div>
        </section>

        ${
          P.now
            ? `<section class="block" id="now">
          <h2 class="block-h">Now</h2>
          <div class="prose">
            <p class="lead">${E(P.now[0])}</p>
            ${P.now
              .slice(1)
              .map((p) => `<p>${E(p)}</p>`)
              .join("")}
          </div>
        </section>`
            : ""
        }

        <section class="block" id="experience">
          <h2 class="block-h">Experience</h2>
          ${itemList(P.experience, "work")}
          ${
            P.experience.some((e) => /Intern|Assistant/i.test(e.role || ""))
              ? `<button type="button" class="show-all-btn" data-more="Show all experience" aria-expanded="false">Show all experience <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="education">
          <h2 class="block-h">Education</h2>
          ${itemList(P.education, "edu")}
        </section>

        <section class="block" id="projects">
          <h2 class="block-h">Projects</h2>
          ${itemList(P.projects, "proj")}
          ${
            P.projects.some((p) => !p.featured)
              ? `<button type="button" class="show-all-btn" data-more="Show all projects" aria-expanded="false">Show all projects <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="publications">
          <h2 class="block-h">Papers</h2>
          <ul class="items">${P.publications
            .map(
              (p) => `<li><a class="item" href="${E(
                p.url,
              )}" target="_blank" rel="noopener" aria-label="${E(p.title)}"><div class="item-h"><span class="item-t">${E(
                p.title,
              )}</span><span class="item-when">${E(
                p.date,
              )}</span></div><p class="item-meta">${E(
                p.venue,
              )}</p><p class="item-desc">${E(p.note)}</p></a></li>`,
            )
            .join("")}</ul>
        </section>

        <section class="block" id="certifications">
          <h2 class="block-h">Certifications</h2>
          <ul class="certs">${P.certifications
            .map(
              (c) => `<li><a class="cert" href="${E(
                c.url,
              )}" target="_blank" rel="noopener"><span class="cert-name">${E(
                c.name,
              )}</span><span class="cert-meta">${E(c.authority)}${
                c.date ? " · " + E(c.date) : ""
              }</span></a></li>`,
            )
            .join("")}</ul>
        </section>

        <section class="block" id="skills">
          <h2 class="block-h">Skills</h2>
          <dl class="skills">${Object.entries(P.skills)
            .map(
              ([c, t]) =>
                `<div class="skill"><dt>${E(c)}</dt><dd>${t
                  .map((s) => `<span class="tag">${E(s)}</span>`)
                  .join("")}</dd></div>`,
            )
            .join("")}</dl>
        </section>

        <section class="block" id="map">
          <h2 class="block-h">Footprints</h2>
          <a class="fp" href="${E(P.footprints.href)}">
            <span class="fp-text">
              <span class="fp-title">A map of everywhere I've been</span>
              <span class="fp-meta">13 countries · 2014–2026</span>
            </span>
            <span class="more">Open the map <span class="ar">→</span></span>
          </a>
        </section>
      </main>
      <footer class="foot"><span>${E(P.name)} · ${E(P.location)}</span><span>© ${new Date().getFullYear()}</span></footer>`;

      // ---- dark / light theme toggle ----
      const themeBtn = document.querySelector(".theme-toggle");
      if (themeBtn) {
        themeBtn.addEventListener("click", () => {
          const next =
            document.documentElement.getAttribute("data-theme") === "dark"
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", next);
          try {
            localStorage.setItem("theme", next);
          } catch (e) {}
        });
      }

      // ---- collapse toggles (experience internships, non-featured projects) ----
      document.querySelectorAll(".show-all-btn").forEach((btn) => {
        const sec = btn.closest("section");
        const list = sec && sec.querySelector(".items");
        if (!list) return;
        const more = btn.dataset.more || "Show all";
        btn.addEventListener("click", () => {
          const open = list.classList.toggle("show-all");
          btn.setAttribute("aria-expanded", open ? "true" : "false");
          btn.innerHTML = open
            ? 'Show fewer <span class="ar">↑</span>'
            : `${more} <span class="ar">→</span>`;
        });
      });
    </script>
  </body>
</html>
