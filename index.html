    <script>
      // set theme before first paint (no flash)
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "dark" && t !== "light")
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", t);
          // theme-color meta only follows the system preference; manual theme switches must update it too (browser UI color)
          window.__syncThemeColor = function (theme) {
            document
              .querySelectorAll('meta[name="theme-color"]')
              .forEach(function (m) {
                m.content = theme === "dark" ? "#16161a" : "#f9f9fa";
                m.removeAttribute("media");
              });
          };
          window.__syncThemeColor(t);
        } catch (e) {}
      })();
    </script>

    <!-- System fonts (Apple HIG): San Francisco on Mac, no external fonts needed -->
    <style>
      /* ============================================================
         Apple Human Interface Guidelines · visual skin
         Rules from: HIG — Materials (translucency) / Elevation (layering) / Buttons
         Accent = brand red (seal red, matching the footprints antique nautical chart); everything else uses Apple neutrals + opacity tiers
         ============================================================ */
      :root {
        --bg: #f9f9fa;                    /* near-white background · [hard rule: never pure white #fff, it glares] */
        --card: #fcfcfc;                 /* near-white card: defined by hairline border + red left bar, not by jumping to a brighter white */
        --ink: #1c1c1e;                  /* label */
        --muted: rgba(60, 60, 67, 0.75); /* secondaryLabel · tuned to ≥4.5:1 (WCAG AA) */
        --faint: rgba(60, 60, 67, 0.3);  /* tertiaryLabel */
        --line: rgba(60, 60, 67, 0.16);  /* separator */
        --fill: rgba(120, 120, 128, 0.12);   /* tertiarySystemFill */
        --accent: #9b2d20;               /* seal red = app tint (matching the footprints antique nautical chart) */
        --accent-ink: #7d2017;
        --accent-soft: rgba(155, 45, 32, 0.1);
        --material: rgba(249, 249, 250, 0.95); /* nav material: RGB matches --bg so the nav blends into the background with no color seam; 0.95 + blur: the hero title scrolling past no longer bleeds through as a gray smudge */
        --content-inset: 27px; /* card text starts at 3px left bar + 24px padding; non-card content aligns to this line */
        --radius-sm: 10px;
        --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
        --shadow-hover: 0 8px 24px -8px rgba(0, 0, 0, 0.16);
        /* Type scale (aligned with the Apple system; eliminates stray/fractional sizes) */
        --fs-display: clamp(40px, 5vw, 48px); /* Hero (64 too heavy; matches andrewng.org's light header; design.js requires 40–64) */
        --fs-title2: 22px;   /* section titles */
        --fs-title3: 20px;   /* hero subtitle */
        --fs-headline: 17px; /* card titles · Apple headline (DESIGN.md §1) */
        --fs-body: 16px;     /* body text */
        --fs-callout: 15px;  /* descriptions */
        --fs-subhead: 14px;  /* secondary descriptions */
        --fs-footnote: 13px; /* tags/kickers/dates */
        --fs-caption: 12px;  /* meta info */
      }
      [data-theme="dark"] {
        /* Dark-mode rules (Material/HIG): 1. no pure black 2. elevation = brighter surface
           3. text tiered by opacity 4. desaturated accent 5. soft shadows convey layering */
        --bg: #16161a;                      /* base surface: dark gray, not pure black */
        --card: #1f1f24;                    /* +1 elevation: brighter than the base */
        --ink: rgba(255, 255, 255, 0.92);   /* high emphasis */
        --muted: rgba(255, 255, 255, 0.58); /* medium emphasis */
        --faint: rgba(255, 255, 255, 0.38); /* low emphasis */
        --line: rgba(255, 255, 255, 0.1);
        --fill: rgba(255, 255, 255, 0.07);
        --accent: #d96a55;                  /* dark-mode brick red: keeps the seal-red identity without drifting to peach (contrast on dark bg ≈5.3:1, AA) */
        --accent-ink: #e2836b;
        --accent-soft: #402c2d; /* hover red bg = 0.18 accent premixed into card: layering translucency directly over #16161a sinks into a muddy red, darker than a resting card */
        --material: rgba(22, 22, 26, 0.95); /* nav material (solid enough that content doesn't bleed through and blur together) */
        --shadow-hover: 0 12px 30px -10px rgba(0, 0, 0, 0.7);
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        background: var(--bg);
        transition: background-color 0.3s ease;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 16px;
        line-height: 1.5;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      #app {
        max-width: 840px;
        margin: 0 auto;
        padding: 0 24px 32px; /* bottom tightened to 32: no big empty band below the footer */
      }
      a {
        color: inherit;
      }
      a:focus-visible,
      button:focus-visible {
        /* Focus ring uses full-strength brand red: non-text elements need ≥3:1 contrast (WCAG); 0.1-alpha faint red is invisible */
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 6px;
      }
      ::selection {
        background: var(--accent-soft);
      }
      /* Accessibility: skip nav straight to main content (off-viewport normally, slides in on keyboard Tab focus) */
      .skip-link {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 100;
        padding: 8px 16px;
        background: #9b2d20; /* pinned to the light-mode seal red: dark-mode #d96a55 with white text is only 3.3:1, fails AA */
        color: #fcfcfc;
        font-family: var(--sans);
        font-size: var(--fs-subhead);
        font-weight: 600;
        text-decoration: none;
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-hover);
        transform: translateY(-200%);
        transition: transform 0.18s ease;
      }
      .skip-link:focus {
        transform: translateY(0);
      }
      #top {
        outline: none;
      }

      /* ---- nav: Apple material (translucent + blur) ---- */
      .nav {
        position: sticky;
        top: 0;
        z-index: 30;
        background: var(--material);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        backdrop-filter: saturate(180%) blur(20px);
        /* No divider line: nav background already equals the page background, blending seamlessly (frosted glass handles the transition while scrolling) */
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 8px;
        transition: background-color 0.3s ease;
      }
      .nav.scrolled {
        /* Still seamless with the background at the top; once scrolled, a hairline sets the nav apart from the content */
        box-shadow: 0 1px 0 var(--line);
      }
      .brand {
        font-weight: 600;
        font-size: var(--fs-body);
        letter-spacing: -0.02em;
        text-decoration: none;
      }
      .navlinks {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .navlinks a {
        font-size: var(--fs-footnote);
        font-weight: 500;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.18s;
      }
      .navlinks a:hover {
        color: var(--accent);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .theme-toggle {
        background: none;
        border: 0;
        padding: 4px;
        cursor: pointer;
        color: var(--muted);
        display: inline-flex;
        flex: none;
        transition: color 0.18s;
      }
      .theme-toggle:hover {
        color: var(--accent);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-toggle .ic-sun {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .ic-moon {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .ic-sun {
        display: inline;
      }
      @media (max-width: 700px) {
        /* Nav scrolls horizontally on one line (iOS segmented-control pattern): 9 links no longer wrap to 4 lines taking ~180px;
           the whole bar drops to ~60px; right-edge fade hints at scrollability, scrollbar hidden; link hit targets ≥44pt (HIG). */
        .nav {
          gap: 4px 16px;
          padding: 4px 0;
        }
        .brand {
          flex: none;
        }
        .nav-right {
          flex: 1;
          min-width: 0;
          gap: 8px;
        }
        .navlinks {
          flex: 1;
          min-width: 0;
          flex-wrap: nowrap;
          overflow-x: auto;
          scrollbar-width: none;
          gap: 16px;
          -webkit-mask-image: linear-gradient(90deg, #000 88%, transparent);
          mask-image: linear-gradient(90deg, #000 88%, transparent);
        }
        .navlinks::-webkit-scrollbar {
          display: none;
        }
        .navlinks a {
          white-space: nowrap;
          display: inline-flex;
          align-items: center;
          min-height: 44px;
          padding: 0 8px;
        }
        .theme-toggle {
          padding: 16px;
        }
        .lnk {
          min-height: 44px;
        }
        button.show-all-btn {
          padding: 16px 0;
          margin-top: 8px;
        }
      }

      /* ---- hero ---- */
      .hero {
        padding: 48px 0 24px; /* bottom 24 matches .block → hero→About gap = section gap of 48px */
      }
      .kicker {
        font-size: var(--fs-subhead);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 16px;
      }
      .kicker .kicker-sub {
        /* Red only for the role; company/city drop to gray — 67 characters of all-red would overpower the tagline */
        color: var(--muted);
      }
      .hero-title {
        font-weight: 600;
        font-size: var(--fs-display);
        line-height: 1.05;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }
      .hero-lead {
        /* 20px regular weight in ink color: the subtitle has presence but doesn't compete with the name (no bold) */
        font-size: var(--fs-title3);
        color: var(--ink);
        max-width: 50ch;
        margin: 0 0 24px;
        text-wrap: pretty;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      /* Ghost pill: transparent background + hairline border, more restrained than a gray fill (color only on hover) */
      .lnk {
        display: inline-flex;
        align-items: center;
        font-size: var(--fs-callout);
        font-weight: 600;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 9999px;
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
        transition: background 0.18s, color 0.18s, border-color 0.18s,
          transform 0.1s;
      }
      .lnk:hover {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: var(--accent);
      }
      .lnk:active {
        transform: scale(0.97);
      }

      /* ---- "Copied" toast for the email button ---- */
      .copied-toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%) translateY(8px);
        background: var(--card);
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 9999px;
        padding: 8px 18px;
        font-size: var(--fs-callout);
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.14);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
        z-index: 999;
      }
      .copied-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      @media (prefers-reduced-motion: reduce) {
        .copied-toast {
          transition: opacity 0.18s ease;
          transform: translateX(-50%);
        }
        .copied-toast.show {
          transform: translateX(-50%);
        }
      }

      /* ---- sections: real title blocks (ink 22px); the whole page has a single "title = large, content = 16px gray" hierarchy ---- */
      .block {
        padding: 24px 0; /* section gap 48px (64 too airy; matches andrewng.org's compactness) */
        scroll-margin-top: calc(
          var(--nav-h, 98px) - 12px
        ); /* --nav-h = measured nav height; -12px cancels half of the block's own 24px padding, so the heading lands 12px under the nav hairline instead of 36px */
      }
      .block-h {
        font-size: var(--fs-title2);
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--ink); /* ink is more formal; red is reserved for kickers/card bars/links, not scattered across the page */
        /* title tied to content (8px) < paragraph/card gap (16px) < section gap (48px): three-tier rhythm, each title owns its block */
        margin: 0 0 8px;
      }
      .prose {
        max-width: 68ch; /* line-length cap: a solid block of gray text at 95+ characters reads limp */
        /* Aligns with card text start (3px bar + 24px padding): all body text shares one left baseline, titles hang at 0 */
        padding-left: var(--content-inset);
      }
      .prose p {
        margin: 0 0 16px;
        color: var(--muted);
        text-wrap: pretty;
      }
      .prose p:last-child {
        margin: 0;
      }
      .prose a {
        /* Body links: accent color + thin underline; otherwise all-gray + default underline doesn't look clickable */
        color: var(--accent);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
        text-decoration-color: color-mix(in srgb, var(--accent) 40%, transparent);
        transition: color 0.18s, text-decoration-color 0.18s;
      }
      .prose a:hover {
        color: var(--accent-ink);
        text-decoration-color: currentColor;
      }

      /* ---- cards: Apple inset-grouped (flat, hairline, subtle elevation) ---- */
      .items {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 16px;
      }
      .item {
        display: block;
        color: inherit;
        text-decoration: none;
        background: var(--card);
        border: 1px solid var(--line);
        border-left: 3px solid var(--accent); /* style 6: red left bar (echoing the seal red) */
        border-radius: 8px;
        padding: 24px;
        box-shadow: none;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      /* Hover only on clickable link cards: div cards without a url get no fake clickable feedback */
      a.item:hover {
        background: var(--accent-soft);
        border-left-color: var(--accent-ink);
      }
      a.item:hover .item-t {
        color: var(--accent);
      }
      a.item .item-t::after {
        content: "↗";
        font-size: 0.78em;
        color: var(--muted); /* faint fails the 3:1 non-text contrast; even at rest it must read as clickable */
        margin-left: 8px;
        transition: color 0.18s;
      }
      a.item:hover .item-t::after {
        color: var(--accent);
      }
      /* In dark mode, --accent on the hover red bg is only ~3.8:1; red text on red bg smears — brighten to accent-ink (≈4.7:1 AA) */
      [data-theme="dark"] a.item:hover .item-t,
      [data-theme="dark"] a.item:hover .item-t::after,
      [data-theme="dark"] .lnk:hover,
      [data-theme="dark"] .fp:hover .fp-title {
        color: var(--accent-ink);
      }
      .is-extra {
        display: none;
      }
      .items.show-all .is-extra {
        display: block;
      }
      /* Apple plain/text button */
      .show-all-btn {
        margin-top: 16px; /* flush left: same left edge as the section title, acting as a section-level control */
        background: none;
        border: 0;
        padding: 0;
        cursor: pointer;
        font-family: var(--sans);
        font-size: var(--fs-subhead);
        font-weight: 600;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .show-all-btn:hover {
        color: var(--accent-ink);
      }
      .item-h {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        flex-wrap: nowrap;
      }
      .item-t {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        font-size: var(--fs-headline);
        letter-spacing: -0.02em;
        transition: color 0.18s;
      }
      .item-t .role {
        color: var(--muted);
        font-weight: 400;
      }
      .item-when {
        font-size: var(--fs-footnote);
        color: var(--muted); /* dates are key info recruiters scan for; faint (0.3 alpha) is too dim */
        font-weight: 500;
        white-space: nowrap;
      }
      .item-meta {
        font-size: var(--fs-footnote);
        color: var(--muted); /* noise reduction: red is kept to left bars/kickers/clickable elements; the meta line doesn't compete with the title */
        font-weight: 500;
        margin: 8px 0 0;
      }
      .item-desc {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: var(--fs-callout);
        line-height: 1.55;
        text-wrap: pretty;
      }

      .more {
        display: inline-block;
        margin-top: 16px;
        font-weight: 600;
        font-size: var(--fs-callout);
        color: var(--accent);
        text-decoration: none;
      }
      .more:hover {
        color: var(--accent-ink);
      }
      .ar {
        display: inline-block;
        transition: transform 0.18s;
      }
      .more:hover .ar,
      .fp:hover .ar {
        transform: translateX(3px);
      }

      /* ---- skills: group header + fill chips ---- */
      .skills {
        margin: 0;
        display: grid;
        gap: 8px;
        padding-left: var(--content-inset); /* same left baseline as card text */
      }
      .skill {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 16px;
        align-items: start;
      }
      /* Skill-category collapsing: .skill defaults to display:grid, so is-extra visibility must be overridden explicitly */
      .skill.is-extra {
        display: none;
      }
      .items.show-all .skill.is-extra {
        display: grid;
      }
      .skill dt {
        font-size: var(--fs-caption);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--muted);
        padding-top: 4px;
      }
      .skill dd {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag {
        font-size: var(--fs-footnote);
        font-weight: 500;
        color: var(--ink);
        background: var(--fill);
        border: none;
        border-radius: 8px;
        padding: 4px 8px;
        line-height: 1.2;
      }

      /* ---- certs: boxed cards (same style as Papers) ---- */
      .cert-grid {
        grid-template-columns: 1fr 1fr;
      }
      .cert-grid > li {
        display: flex;
      }
      .cert-grid .item {
        flex: 1;
        padding: 16px;
        /* In equal-height rows, the authority line of shorter cards sinks to the bottom, aligning within the row */
        display: flex;
        flex-direction: column;
      }
      .cert-grid .item-meta {
        margin-top: auto;
      }
      /* Certification collapsing: li is flex (equal height), so is-extra visibility must be overridden explicitly */
      .cert-grid > li.is-extra {
        display: none;
      }
      .cert-grid.show-all > li.is-extra {
        display: flex;
      }
      @media (max-width: 620px) {
        .cert-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ---- footprints card (style 6, same card language as .item) ---- */
      .fp {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        text-decoration: none;
        background: var(--card);
        border: 1px solid var(--line);
        border-left: 3px solid var(--accent);
        border-radius: 8px;
        padding: 16px 24px;
        box-shadow: none;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .fp:hover {
        background: var(--accent-soft);
        border-left-color: var(--accent-ink);
      }
      .fp:hover .fp-title {
        color: var(--accent);
      }
      .fp-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .fp-title {
        font-weight: 600;
        font-size: var(--fs-headline);
        letter-spacing: -0.01em;
        color: var(--ink);
        transition: color 0.18s;
      }
      .fp-meta {
        font-size: var(--fs-caption);
        color: var(--muted);
      }

      .foot {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 32px;
        color: var(--muted); /* faint is only 1.7:1 in light mode; the footer must pass AA too */
        font-size: var(--fs-footnote);
        font-weight: 500;
      }
      @media (max-width: 620px) {
        .skill {
          grid-template-columns: 1fr;
        }
        /* On narrow screens the date wraps below the title: no longer crowding the title's line and chopping it up */
        .item-h {
          flex-wrap: wrap;
          row-gap: 4px;
        }
        .item-when {
          width: 100%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *,
        *::before,
        *::after {
          transition: none !important;
          animation: none !important;
          scroll-behavior: auto !important;
        }
      }
      /* ---- Print / save-as-PDF: the résumé should be clean and complete (black on white, screen-only controls removed, collapsed sections expanded) ---- */
      @media print {
        /* Force light mode even if the user prints from dark mode: saves ink and stays crisp */
        :root,
        [data-theme="dark"] {
          --bg: #fff;
          --card: #fff;
          --ink: #1c1c1e;
          --muted: rgba(60, 60, 67, 0.78);
          --faint: rgba(60, 60, 67, 0.4);
          --line: rgba(60, 60, 67, 0.22);
          --fill: rgba(120, 120, 128, 0.1);
          /* Keep the brand seal red in print (darker red prints more solid); the white background is a deliberate ink-saving exemption */
          --accent: #7d2017;
          --accent-ink: #7d2017;
          --accent-soft: rgba(155, 45, 32, 0.08);
          --material: #fff;
          --shadow-hover: none;
        }
        body {
          background: #fff;
        }
        * {
          box-shadow: none !important;
        }
        /* Screen-only controls are meaningless on paper (hide the whole #map section so no orphaned Footprints title is left behind) */
        .nav,
        .theme-toggle,
        #map,
        .show-all-btn {
          display: none !important;
        }
        /* Collapsed experience / projects / certifications / skills all expand in print (restoring their respective display values) */
        .is-extra {
          display: block !important;
        }
        .cert-grid > li.is-extra {
          display: flex !important;
        }
        .skill.is-extra {
          display: grid !important;
        }
        /* Keep cards / sections from being cut by page breaks where possible */
        section,
        .item {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#top">Skip to content</a>
    <div id="app">
      <noscript>
        <main style="max-width:640px;margin:88px auto;padding:24px;background:#f9f9fa;border-radius:8px;font-family:system-ui,sans-serif;color:#1b1c20">
          <h1 style="font-size:34px;margin:0 0 16px">Sherry (Ke) Shi</h1>
          <p style="color:#6b6f78;line-height:1.6">Data Engineer &amp; ML Engineer · Toronto. This page needs JavaScript; reach her directly:</p>
          <p><a href="mailto:keshi0330@gmail.com">keshi0330@gmail.com</a> &nbsp;·&nbsp; <a href="https://github.com/kkkkshi">GitHub</a> &nbsp;·&nbsp; <a href="https://www.linkedin.com/in/keshi0330/">LinkedIn</a></p>
        </main>
      </noscript>
    </div>
    <script src="profile/data.js"></script>
    <script>
      const P = window.PROFILE;
      if (!P) {
        document.getElementById("app").innerHTML =
          '<main style="max-width:640px;margin:88px auto;padding:24px;background:#f9f9fa;border-radius:8px;font-family:system-ui,sans-serif;color:#1b1c20">' +
          '<h1 style="font-size:34px;margin:0 0 16px">Sherry (Ke) Shi</h1>' +
          '<p style="color:#6b6f78;line-height:1.6">Data Engineer &amp; ML Engineer · Toronto. The page didn’t load fully. Reach her directly:</p>' +
          '<p><a href="mailto:keshi0330@gmail.com">keshi0330@gmail.com</a> &nbsp;·&nbsp; ' +
          '<a href="https://github.com/kkkkshi">GitHub</a> &nbsp;·&nbsp; ' +
          '<a href="https://www.linkedin.com/in/keshi0330/">LinkedIn</a></p></main>';
        throw new Error("PROFILE data unavailable");
      }
      /* title / meta description use the static values in <head>: overriding via JS makes the tab flicker
         and downgrades the search snippet to the 5-word tagline (Google indexes the JS-rendered result) */

      const E = (s) =>
        String(s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      /* [text](url) → <a>, used only in the Now paragraphs; input goes through E() escaping first, then this lets controlled <a> through */
      const mdLink = (s) =>
        s.replace(
          /\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>',
        );
      const LABEL = {
        email: "Email",
        github: "GitHub",
        linkedin: "LinkedIn",
        resume: "Résumé",
      };
      const linkrow = (keys) =>
        keys
          .filter((k) => P.links[k])
          .map((k) => {
            const href = k === "email" ? "mailto:" + P.email : P.links[k];
            const ext =
              k === "email"
                ? ` data-copy-email="${E(P.email)}"`
                : ' target="_blank" rel="noopener"';
            return `<a class="lnk" href="${E(href)}"${ext}>${LABEL[k]}</a>`;
          })
          .join("");
      const tagline = E(P.tagline);

      const itemList = (arr, kind) =>
        `<ul class="items">${arr
          .map((e) => {
            const title =
              kind === "work"
                ? `${E(e.company)} <span class="role">· ${E(e.role)}</span>`
                : E(e.school || e.name);
            /* Escape each part, filter out empties, then join: prevents undefined / dangling " · " */
            const meta = (
              kind === "edu"
                ? [e.degree, e.note].map((s) => s && E(s))
                : [
                    (e.project || e.sub) && E(e.project || e.sub),
                    e.stack && e.stack.length
                      ? e.stack.map(E).join(" · ")
                      : "",
                  ]
            )
              .filter(Boolean)
              .join(" · ");
            const body = (e.bullets || [])
              .map((b) => `<p class="item-desc">${E(b)}</p>`)
              .join("");
            const url =
              e.url ||
              (kind === "proj" && e.repo
                ? `https://github.com/${P.githubUser}/${e.repo}`
                : "");
            const inner = `<div class="item-h"><span class="item-t">${title}</span><span class="item-when">${E(e.period)}</span></div><p class="item-meta">${meta}</p>${body}`;
            const isExtra =
              (kind === "work" && /Intern|Assistant/i.test(e.role || "")) ||
              (kind === "proj" && !e.featured);
            const liClass = isExtra ? ' class="is-extra"' : "";
            return `<li${liClass}>${
              url
                ? `<a class="item" href="${E(
                    url,
                  )}" target="_blank" rel="noopener">${inner}</a>`
                : `<div class="item">${inner}</div>`
            }</li>`;
          })
          .join("")}</ul>`;

      document.getElementById("app").innerHTML = `
      <header class="nav">
        <a href="#top" class="brand">${E(P.name)}</a>
        <div class="nav-right">
          <nav class="navlinks">
            <a href="#about">About</a><a href="#now">Now</a><a href="#experience">Experience</a><a href="#education">Education</a><a href="#projects">Projects</a><a href="#publications">Papers</a><a href="#certifications">Certifications</a><a href="#skills">Skills</a><a href="#map">Footprints</a>
          </nav>
          <button type="button" class="theme-toggle" aria-label="Toggle dark mode">
            <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
            <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
        </div>
      </header>
      <main id="top" tabindex="-1">
        <section class="hero">
          <h1 class="hero-title">${E(P.name)}</h1>
          <p class="kicker">${E(P.role)}<span class="kicker-sub">${P.company ? " · " + E(P.company) : ""} · ${E(P.location)}</span></p>
          <p class="hero-lead">${tagline}</p>
          <div class="links">${linkrow(["email", "github", "linkedin", "resume"])}</div>
        </section>

        <section class="block" id="about">
          <h2 class="block-h">About</h2>
          <div class="prose">
            ${P.about.map((p) => `<p>${E(p)}</p>`).join("")}
          </div>
        </section>

        ${
          P.now
            ? `<section class="block" id="now">
          <h2 class="block-h">Now</h2>
          <div class="prose">
            ${P.now
              .map((p) => `<p>${mdLink(E(p))}</p>`)
              .join("")}
          </div>
        </section>`
            : ""
        }

        <section class="block" id="experience">
          <h2 class="block-h">Experience</h2>
          ${itemList(P.experience, "work")}
          ${
            P.experience.some((e) => /Intern|Assistant/i.test(e.role || ""))
              ? `<button type="button" class="show-all-btn" data-more="Show all experience" aria-expanded="false">Show all experience <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="education">
          <h2 class="block-h">Education</h2>
          ${itemList(P.education, "edu")}
        </section>

        <section class="block" id="projects">
          <h2 class="block-h">Projects</h2>
          ${itemList(P.projects, "proj")}
          ${
            P.projects.some((p) => !p.featured)
              ? `<button type="button" class="show-all-btn" data-more="Show all projects" aria-expanded="false">Show all projects <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="publications">
          <h2 class="block-h">Papers</h2>
          <ul class="items">${P.publications
            .map(
              (p) => `<li><a class="item" href="${E(
                p.url,
              )}" target="_blank" rel="noopener"><div class="item-h"><span class="item-t">${E(
                p.title,
              )}</span><span class="item-when">${E(
                p.date,
              )}</span></div><p class="item-meta">${E(
                p.venue,
              )}</p><p class="item-desc">${E(p.note)}</p></a></li>`,
            )
            .join("")}</ul>
        </section>

        <section class="block" id="certifications">
          <h2 class="block-h">Certifications</h2>
          <ul class="items cert-grid">${P.certifications
            .map(
              (c) => `<li${c.featured ? "" : ' class="is-extra"'}><a class="item" href="${E(
                c.url,
              )}" target="_blank" rel="noopener"><div class="item-h"><span class="item-t">${E(
                c.name,
              )}</span><span class="item-when">${E(
                c.date,
              )}</span></div><p class="item-meta">${E(c.authority)}</p></a></li>`,
            )
            .join("")}</ul>
          ${
            P.certifications.some((c) => !c.featured)
              ? `<button type="button" class="show-all-btn" data-more="Show all certifications" aria-expanded="false">Show all certifications <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="skills">
          <h2 class="block-h">Skills</h2>
          <dl class="skills items">${Object.entries(P.skills)
            .map(
              ([c, t]) =>
                `<div class="skill${
                  P.skillsFeatured && !P.skillsFeatured.includes(c)
                    ? " is-extra"
                    : ""
                }"><dt>${E(c)}</dt><dd>${t
                  .map((s) => `<span class="tag">${E(s)}</span>`)
                  .join("")}</dd></div>`,
            )
            .join("")}</dl>
          ${
            P.skillsFeatured &&
            Object.keys(P.skills).some((c) => !P.skillsFeatured.includes(c))
              ? `<button type="button" class="show-all-btn" data-more="Show all skills" aria-expanded="false">Show all skills <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="map">
          <h2 class="block-h">Footprints</h2>
          <a class="fp" href="${E(P.footprints.href)}">
            <span class="fp-text">
              <span class="fp-title">${E(P.footprints.title)}</span>
              <span class="fp-meta">${E(P.footprints.meta)}</span>
            </span>
            <span class="more">Open the map <span class="ar">→</span></span>
          </a>
        </section>
      </main>
      <footer class="foot"><span>${E(P.name)} · ${E(P.location)}</span><span>© ${new Date().getFullYear()}</span></footer>`;

      // ---- dark / light theme toggle ----
      const themeBtn = document.querySelector(".theme-toggle");
      if (themeBtn) {
        const syncPressed = () =>
          themeBtn.setAttribute(
            "aria-pressed",
            document.documentElement.getAttribute("data-theme") === "dark"
              ? "true"
              : "false",
          );
        syncPressed();
        themeBtn.addEventListener("click", () => {
          const next =
            document.documentElement.getAttribute("data-theme") === "dark"
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", next);
          syncPressed();
          if (window.__syncThemeColor) window.__syncThemeColor(next);
          try {
            localStorage.setItem("theme", next);
          } catch (e) {}
        });
      }

      // ---- nav: add a hairline after scrolling (paired with the 0.95 material so the hero title scrolling past doesn't bleed through as a gray smudge) ----
      const navEl = document.querySelector(".nav");
      addEventListener(
        "scroll",
        () => navEl.classList.toggle("scrolled", scrollY > 8),
        { passive: true },
      );

      // ---- anchor offset tracks the real nav height (see .block scroll-margin-top) ----
      new ResizeObserver(() =>
        document.documentElement.style.setProperty(
          "--nav-h",
          navEl.offsetHeight + "px",
        ),
      ).observe(navEl);

      // ---- mobile nav strip: the tapped link scrolls to the strip's left edge, iOS-tab style (next to the brand); clamps at the end of the strip. Desktop strip doesn't overflow, so this is a no-op there ----
      document.querySelector(".navlinks").addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        a.parentElement.scrollBy({
          left:
            a.getBoundingClientRect().left -
            a.parentElement.getBoundingClientRect().left,
          behavior: matchMedia("(prefers-reduced-motion: reduce)").matches
            ? "auto"
            : "smooth",
        });
      });

      // ---- collapse toggles (experience internships, non-featured projects) ----
      document.querySelectorAll(".show-all-btn").forEach((btn) => {
        const sec = btn.closest("section");
        const list = sec && sec.querySelector(".items");
        if (!list) return;
        const more = btn.dataset.more || "Show all";
        btn.addEventListener("click", () => {
          const open = list.classList.toggle("show-all");
          btn.setAttribute("aria-expanded", open ? "true" : "false");
          btn.innerHTML = open
            ? 'Show fewer <span class="ar">↑</span>'
            : `${more} <span class="ar">→</span>`;
        });
      });

      // ---- email button: click copies the address and always shows a toast ----
      const copyEmail = (text) => {
        // best-effort: try the async Clipboard API, fall back to a hidden textarea
        try {
          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).catch(() => {});
            return;
          }
        } catch (e) {}
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        } catch (e) {}
      };
      let toastEl, toastTimer;
      const showToast = (msg) => {
        if (!toastEl) {
          toastEl = document.createElement("div");
          toastEl.className = "copied-toast";
          document.body.appendChild(toastEl);
        }
        toastEl.textContent = msg;
        toastEl.classList.remove("show");
        void toastEl.offsetWidth; // force reflow so the pop animation replays on every click
        toastEl.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
      };
      document.querySelectorAll("a.lnk[data-copy-email]").forEach((a) => {
        a.addEventListener("click", (ev) => {
          ev.preventDefault();
          copyEmail(a.getAttribute("data-copy-email"));
          showToast("Copied to clipboard");
        });
      });
    </script>
  </body>
</html>
