    <meta
      name="theme-color"
      content="#f9f9fa"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#16161a"
      media="(prefers-color-scheme: dark)"
    />
    <script>
      // set theme before first paint (no flash)
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "dark" && t !== "light")
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", t);
          // theme-color meta 只认系统偏好,手动主题要跟着改(浏览器 UI 颜色)
          window.__syncThemeColor = function (theme) {
            document
              .querySelectorAll('meta[name="theme-color"]')
              .forEach(function (m) {
                m.content = theme === "dark" ? "#16161a" : "#f9f9fa";
                m.removeAttribute("media");
              });
          };
          window.__syncThemeColor(t);
        } catch (e) {}
      })();
    </script>

    <!-- 系统字体（Apple HIG）：Mac 上即 San Francisco，无需外部字体 -->
    <style>
      /* ============================================================
         Apple Human Interface Guidelines · visual skin
         规则来源：HIG — Materials(透明度) / Elevation(层级) / Buttons
         强调色 = 品牌红（印章红，对齐 footprints 古海图）；其余走苹果中性 + 不透明度分级
         ============================================================ */
      :root {
        --bg: #f9f9fa;                    /* 近白底 ·【硬规则：不得纯白 #fff，会刺眼】 */
        --card: #fcfcfc;                 /* 近白卡片：靠细描边 + 红色左边条定义，不靠亮度跳白 */
        --ink: #1c1c1e;                  /* label */
        --muted: rgba(60, 60, 67, 0.75); /* secondaryLabel · 调至 ≥4.5:1 (WCAG AA) */
        --faint: rgba(60, 60, 67, 0.3);  /* tertiaryLabel */
        --line: rgba(60, 60, 67, 0.16);  /* separator */
        --fill: rgba(120, 120, 128, 0.12);   /* tertiarySystemFill */
        --accent: #9b2d20;               /* 印章红 = app tint（对齐 footprints 古海图）*/
        --accent-ink: #7d2017;
        --accent-soft: rgba(155, 45, 32, 0.1);
        --material: rgba(249, 249, 250, 0.95); /* nav material：RGB 对齐 --bg，导航融入背景不露色差；0.95+毛玻璃:滚过的 hero 大标题不再透成灰渍 */
        --content-inset: 27px; /* 卡片文字起点 = 3px 左边条 + 24px 内边距;非卡片内容对齐这条线 */
        --radius-sm: 10px;
        --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
        --shadow-hover: 0 8px 24px -8px rgba(0, 0, 0, 0.16);
        /* 字号阶梯 type scale（对齐 Apple 体系，消除零散/小数字号）*/
        --fs-display: clamp(40px, 5vw, 48px); /* Hero(64 太压头,对齐 andrewng.org 的轻头部;design.js 要求 40–64) */
        --fs-title2: 22px;   /* 区块标题 */
        --fs-title3: 20px;   /* Hero 副文案 */
        --fs-headline: 17px; /* 卡片标题 · Apple headline（DESIGN.md §1）*/
        --fs-body: 16px;     /* 正文 */
        --fs-callout: 15px;  /* 描述 */
        --fs-subhead: 14px;  /* 次要描述 */
        --fs-footnote: 13px; /* 标签/眉头/时间 */
        --fs-caption: 12px;  /* 元信息 */
      }
      [data-theme="dark"] {
        /* 暗色规范(Material/HIG)：① 不用纯黑 ② 海拔=更亮的表面
           ③ 文字按不透明度分级 ④ 强调色去饱和 ⑤ 柔和阴影表达层级 */
        --bg: #16161a;                      /* 基础表面：深灰，非纯黑 */
        --card: #1f1f24;                    /* +1 海拔：比底更亮 */
        --ink: rgba(255, 255, 255, 0.92);   /* 高强调 */
        --muted: rgba(255, 255, 255, 0.58); /* 中强调 */
        --faint: rgba(255, 255, 255, 0.38); /* 低强调 */
        --line: rgba(255, 255, 255, 0.1);
        --fill: rgba(255, 255, 255, 0.07);
        --accent: #d96a55;                  /* 暗色砖红:守住印章红身份不漂成桃色（暗底对比≈5.3:1,AA）*/
        --accent-ink: #e2836b;
        --accent-soft: #402c2d; /* hover 红底 = 0.18 accent 预混进 card:半透明直接叠 #16161a 会沉成浑红,比静息卡还暗 */
        --material: rgba(22, 22, 26, 0.95); /* 导航材质（够实，内容不透出来糊在一起）*/
        --shadow-hover: 0 12px 30px -10px rgba(0, 0, 0, 0.7);
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        background: var(--bg);
        transition: background-color 0.3s ease;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 16px;
        line-height: 1.5;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      #app {
        max-width: 840px;
        margin: 0 auto;
        padding: 0 24px 32px; /* 底部收到 32:footer 下不留大片空白 */
      }
      a {
        color: inherit;
      }
      a:focus-visible,
      button:focus-visible {
        /* 焦点环用全强度品牌红:非文字元素对比 ≥3:1(WCAG),淡红 0.1α 肉眼不可见 */
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 6px;
      }
      ::selection {
        background: var(--accent-soft);
      }
      /* 无障碍:跳过导航直达主内容(平时移出视口,键盘 Tab 聚焦时滑入) */
      .skip-link {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 100;
        padding: 8px 16px;
        background: #9b2d20; /* 钉死浅色印章红:暗色 #d96a55 配白字只有 3.3:1,过不了 AA */
        color: #fcfcfc;
        font-family: var(--sans);
        font-size: var(--fs-subhead);
        font-weight: 600;
        text-decoration: none;
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-hover);
        transform: translateY(-200%);
        transition: transform 0.18s ease;
      }
      .skip-link:focus {
        transform: translateY(0);
      }
      #top {
        outline: none;
      }

      /* ---- nav: Apple material (translucent + blur) ---- */
      .nav {
        position: sticky;
        top: 0;
        z-index: 30;
        background: var(--material);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        backdrop-filter: saturate(180%) blur(20px);
        /* 不画分隔线:导航底色已等于页面背景,无缝融入(滚动时靠毛玻璃自然过渡) */
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 8px;
        transition: background-color 0.3s ease;
      }
      .nav.scrolled {
        /* 顶部仍与背景无缝;滚起来后一条发丝线把导航从内容里定出来 */
        box-shadow: 0 1px 0 var(--line);
      }
      .brand {
        font-weight: 600;
        font-size: var(--fs-body);
        letter-spacing: -0.02em;
        text-decoration: none;
      }
      .navlinks {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .navlinks a {
        font-size: var(--fs-footnote);
        font-weight: 500;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.18s;
      }
      .navlinks a:hover {
        color: var(--accent);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .theme-toggle {
        background: none;
        border: 0;
        padding: 4px;
        cursor: pointer;
        color: var(--muted);
        display: inline-flex;
        flex: none;
        transition: color 0.18s;
      }
      .theme-toggle:hover {
        color: var(--accent);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-toggle .ic-sun {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .ic-moon {
        display: none;
      }
      [data-theme="dark"] .theme-toggle .ic-sun {
        display: inline;
      }
      @media (max-width: 700px) {
        /* 导航单行横滚（iOS 分段控件模式）：9 链接不再折 4 行常驻 ~180px,
           整条降到 ~60px;右缘渐隐提示可滚,滚动条隐藏;链接热区 ≥44pt(HIG)。 */
        .nav {
          gap: 4px 16px;
          padding: 4px 0;
        }
        .brand {
          flex: none;
        }
        .nav-right {
          flex: 1;
          min-width: 0;
          gap: 8px;
        }
        .navlinks {
          flex: 1;
          min-width: 0;
          flex-wrap: nowrap;
          overflow-x: auto;
          scrollbar-width: none;
          gap: 16px;
          -webkit-mask-image: linear-gradient(90deg, #000 88%, transparent);
          mask-image: linear-gradient(90deg, #000 88%, transparent);
        }
        .navlinks::-webkit-scrollbar {
          display: none;
        }
        .navlinks a {
          white-space: nowrap;
          display: inline-flex;
          align-items: center;
          min-height: 44px;
          padding: 0 8px;
        }
        .theme-toggle {
          padding: 16px;
        }
        .lnk {
          min-height: 44px;
        }
        button.show-all-btn {
          padding: 16px 0;
          margin-top: 8px;
        }
      }

      /* ---- hero ---- */
      .hero {
        padding: 48px 0 24px; /* 底 24 与 .block 一致 → hero→About 间距 = 区块间距 48px */
      }
      .kicker {
        font-size: var(--fs-subhead);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 16px;
      }
      .kicker .kicker-sub {
        /* 红只给职位;公司/城市降灰,整条 67 字符全红会压过 tagline */
        color: var(--muted);
      }
      .hero-title {
        font-weight: 600;
        font-size: var(--fs-display);
        line-height: 1.05;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }
      .hero-lead {
        /* 20px 常规字重上墨色:副标题有存在感但不与名字抢戏(不加粗) */
        font-size: var(--fs-title3);
        color: var(--ink);
        max-width: 50ch;
        margin: 0 0 24px;
        text-wrap: pretty;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      /* 幽灵胶囊:透明底 + 发丝描边,比灰底填充更收敛(hover 才上色) */
      .lnk {
        display: inline-flex;
        align-items: center;
        font-size: var(--fs-callout);
        font-weight: 600;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 9999px;
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
        transition: background 0.18s, color 0.18s, border-color 0.18s,
          transform 0.1s;
      }
      .lnk:hover {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: var(--accent);
      }
      .lnk:active {
        transform: scale(0.97);
      }

      /* ---- sections: 真标题分块(墨色 22px),全页只有一套"标题=大、内容=16px 灰"的层级 ---- */
      .block {
        padding: 24px 0; /* 区块间距 48px(64 太空,对齐 andrewng.org 的紧凑感) */
        scroll-margin-top: 110px;
      }
      .block-h {
        font-size: var(--fs-title2);
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--ink); /* 墨色更正式;红只留给 kicker/卡片边条/链接,不满页跑 */
        /* 标题绑内容(8px) < 段落/卡片间距(16px) < 区块间距(48px):三档节奏,标题拥有自己的块 */
        margin: 0 0 8px;
      }
      .prose {
        max-width: 68ch; /* 行长上限:95+ 字符的整块灰字读起来瘫 */
        /* 对齐卡片文字起点(3px 边条+24px 内边距):全页正文同一条左基线,标题挂在 0 */
        padding-left: var(--content-inset);
      }
      .prose p {
        margin: 0 0 16px;
        color: var(--muted);
        text-wrap: pretty;
      }
      .prose p:last-child {
        margin: 0;
      }
      .prose a {
        /* 正文链接:强调色 + 细下划线,不然全灰 + 默认下划线不像可点 */
        color: var(--accent);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
        text-decoration-color: color-mix(in srgb, var(--accent) 40%, transparent);
        transition: color 0.18s, text-decoration-color 0.18s;
      }
      .prose a:hover {
        color: var(--accent-ink);
        text-decoration-color: currentColor;
      }

      /* ---- cards: Apple inset-grouped (flat, hairline, subtle elevation) ---- */
      .items {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 16px;
      }
      .item {
        display: block;
        color: inherit;
        text-decoration: none;
        background: var(--card);
        border: 1px solid var(--line);
        border-left: 3px solid var(--accent); /* 样式6：红色左边条（呼应印章红） */
        border-radius: 8px;
        padding: 24px;
        box-shadow: none;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      /* hover 只给可点的链接卡:无 url 的 div 卡不给假可点反馈 */
      a.item:hover {
        background: var(--accent-soft);
        border-left-color: var(--accent-ink);
      }
      a.item:hover .item-t {
        color: var(--accent);
      }
      a.item .item-t::after {
        content: "↗";
        font-size: 0.78em;
        color: var(--muted); /* faint 过不了 3:1 非文字对比,静息也要能看出可点 */
        margin-left: 8px;
        transition: color 0.18s;
      }
      a.item:hover .item-t::after {
        color: var(--accent);
      }
      /* 暗色 hover 红底上 --accent 只有 ~3.8:1,红字压红底发糊;提亮到 accent-ink(≈4.7:1 AA) */
      [data-theme="dark"] a.item:hover .item-t,
      [data-theme="dark"] a.item:hover .item-t::after,
      [data-theme="dark"] .lnk:hover,
      [data-theme="dark"] .fp:hover .fp-title {
        color: var(--accent-ink);
      }
      .is-extra {
        display: none;
      }
      .items.show-all .is-extra {
        display: block;
      }
      /* Apple plain/text button */
      .show-all-btn {
        margin-top: 16px; /* 顶格:和区块标题同一条左缘,作为区块级控件 */
        background: none;
        border: 0;
        padding: 0;
        cursor: pointer;
        font-family: var(--sans);
        font-size: var(--fs-subhead);
        font-weight: 600;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .show-all-btn:hover {
        color: var(--accent-ink);
      }
      .item-h {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        flex-wrap: nowrap;
      }
      .item-t {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        font-size: var(--fs-headline);
        letter-spacing: -0.02em;
        transition: color 0.18s;
      }
      .item-t .role {
        color: var(--muted);
        font-weight: 400;
      }
      .item-when {
        font-size: var(--fs-footnote);
        color: var(--muted); /* 日期是招聘官扫读的关键信息,faint(0.3α)太淡 */
        font-weight: 500;
        white-space: nowrap;
      }
      .item-meta {
        font-size: var(--fs-footnote);
        color: var(--muted); /* 降噪:红色只留左边条/眉头/可点元素,meta 行不与标题抢眼 */
        font-weight: 500;
        margin: 8px 0 0;
      }
      .item-desc {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: var(--fs-callout);
        line-height: 1.55;
        text-wrap: pretty;
      }

      .more {
        display: inline-block;
        margin-top: 16px;
        font-weight: 600;
        font-size: var(--fs-callout);
        color: var(--accent);
        text-decoration: none;
      }
      .more:hover {
        color: var(--accent-ink);
      }
      .ar {
        display: inline-block;
        transition: transform 0.18s;
      }
      .more:hover .ar,
      .fp:hover .ar {
        transform: translateX(3px);
      }

      /* ---- skills: group header + fill chips ---- */
      .skills {
        margin: 0;
        display: grid;
        gap: 8px;
        padding-left: var(--content-inset); /* 与卡片文字同一条左基线 */
      }
      .skill {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 16px;
        align-items: start;
      }
      /* 技能类目折叠:.skill 自带 display:grid,要显式覆盖 is-extra 的显隐 */
      .skill.is-extra {
        display: none;
      }
      .items.show-all .skill.is-extra {
        display: grid;
      }
      .skill dt {
        font-size: var(--fs-caption);
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--muted);
        padding-top: 4px;
      }
      .skill dd {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag {
        font-size: var(--fs-footnote);
        font-weight: 500;
        color: var(--ink);
        background: var(--fill);
        border: none;
        border-radius: 8px;
        padding: 4px 8px;
        line-height: 1.2;
      }

      /* ---- certs: boxed cards (same style as Papers) ---- */
      .cert-grid {
        grid-template-columns: 1fr 1fr;
      }
      .cert-grid > li {
        display: flex;
      }
      .cert-grid .item {
        flex: 1;
        padding: 16px;
        /* 等高行里矮卡的机构行沉底,同一行内部对齐 */
        display: flex;
        flex-direction: column;
      }
      .cert-grid .item-meta {
        margin-top: auto;
      }
      /* 证书折叠:li 是 flex(等高),要显式覆盖 is-extra 的显隐 */
      .cert-grid > li.is-extra {
        display: none;
      }
      .cert-grid.show-all > li.is-extra {
        display: flex;
      }
      @media (max-width: 620px) {
        .cert-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ---- footprints card（样式6,与 .item 同一卡片语言）---- */
      .fp {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        text-decoration: none;
        background: var(--card);
        border: 1px solid var(--line);
        border-left: 3px solid var(--accent);
        border-radius: 8px;
        padding: 16px 24px;
        box-shadow: none;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .fp:hover {
        background: var(--accent-soft);
        border-left-color: var(--accent-ink);
      }
      .fp:hover .fp-title {
        color: var(--accent);
      }
      .fp-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .fp-title {
        font-weight: 600;
        font-size: var(--fs-headline);
        letter-spacing: -0.01em;
        color: var(--ink);
        transition: color 0.18s;
      }
      .fp-meta {
        font-size: var(--fs-caption);
        color: var(--muted);
      }

      .foot {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 32px;
        color: var(--muted); /* faint 在浅色只有 1.7:1,footer 也要过 AA */
        font-size: var(--fs-footnote);
        font-weight: 500;
      }
      @media (max-width: 620px) {
        .skill {
          grid-template-columns: 1fr;
        }
        /* 窄屏日期换行到标题下方:不再和标题挤一行把标题切碎 */
        .item-h {
          flex-wrap: wrap;
          row-gap: 4px;
        }
        .item-when {
          width: 100%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *,
        *::before,
        *::after {
          transition: none !important;
          animation: none !important;
          scroll-behavior: auto !important;
        }
      }
      /* ---- 打印 / 存 PDF:简历应干净完整(白底黑字、去掉屏幕专属控件、展开折叠) ---- */
      @media print {
        /* 即便用户在暗色下打印,也强制浅色省墨清晰 */
        :root,
        [data-theme="dark"] {
          --bg: #fff;
          --card: #fff;
          --ink: #1c1c1e;
          --muted: rgba(60, 60, 67, 0.78);
          --faint: rgba(60, 60, 67, 0.4);
          --line: rgba(60, 60, 67, 0.22);
          --fill: rgba(120, 120, 128, 0.1);
          /* 打印保持品牌印章红(深红打印更实);白底是省墨的有意豁免 */
          --accent: #7d2017;
          --accent-ink: #7d2017;
          --accent-soft: rgba(155, 45, 32, 0.08);
          --material: #fff;
          --shadow-hover: none;
        }
        body {
          background: #fff;
        }
        * {
          box-shadow: none !important;
        }
        /* 屏幕专属控件在纸面无意义(#map 整区隐藏,免得留一个光杆 Footprints 标题) */
        .nav,
        .theme-toggle,
        #map,
        .show-all-btn {
          display: none !important;
        }
        /* 折叠的经历 / 项目 / 证书 / 技能在打印时全展开(恢复各自的 display) */
        .is-extra {
          display: block !important;
        }
        .cert-grid > li.is-extra {
          display: flex !important;
        }
        .skill.is-extra {
          display: grid !important;
        }
        /* 卡片 / 分区尽量不被分页切断 */
        section,
        .item {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#top">Skip to content</a>
    <div id="app">
      <noscript>
        <main style="max-width:640px;margin:88px auto;padding:24px;background:#f9f9fa;border-radius:8px;font-family:system-ui,sans-serif;color:#1b1c20">
          <h1 style="font-size:34px;margin:0 0 16px">Sherry (Ke) Shi</h1>
          <p style="color:#6b6f78;line-height:1.6">Data Engineer &amp; ML Engineer · Toronto. This page needs JavaScript; reach her directly:</p>
          <p><a href="mailto:keshi0330@gmail.com">keshi0330@gmail.com</a> &nbsp;·&nbsp; <a href="https://github.com/kkkkshi">GitHub</a> &nbsp;·&nbsp; <a href="https://www.linkedin.com/in/keshi0330/">LinkedIn</a></p>
        </main>
      </noscript>
    </div>
    <script src="profile/data.js"></script>
    <script>
      const P = window.PROFILE;
      if (!P) {
        document.getElementById("app").innerHTML =
          '<main style="max-width:640px;margin:88px auto;padding:24px;background:#f9f9fa;border-radius:8px;font-family:system-ui,sans-serif;color:#1b1c20">' +
          '<h1 style="font-size:34px;margin:0 0 16px">Sherry (Ke) Shi</h1>' +
          '<p style="color:#6b6f78;line-height:1.6">Data Engineer &amp; ML Engineer · Toronto. The page didn’t load fully. Reach her directly:</p>' +
          '<p><a href="mailto:keshi0330@gmail.com">keshi0330@gmail.com</a> &nbsp;·&nbsp; ' +
          '<a href="https://github.com/kkkkshi">GitHub</a> &nbsp;·&nbsp; ' +
          '<a href="https://www.linkedin.com/in/keshi0330/">LinkedIn</a></p></main>';
        throw new Error("PROFILE data unavailable");
      }
      /* title / meta description 用 <head> 里的静态值:JS 覆盖会让标签页闪变、
         并把搜索摘要降级成 5 词 tagline(Google 抓 JS 渲染后的结果) */

      const E = (s) =>
        String(s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      /* [text](url) → <a>,仅用于 now 段落;输入先过 E() 转义,再由这里放行受控的 <a> */
      const mdLink = (s) =>
        s.replace(
          /\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>',
        );
      const LABEL = {
        email: "Email",
        github: "GitHub",
        linkedin: "LinkedIn",
        resume: "Résumé",
      };
      const linkrow = (keys) =>
        keys
          .filter((k) => P.links[k])
          .map((k) => {
            const href = k === "email" ? "mailto:" + P.email : P.links[k];
            const ext = k === "email" ? "" : ' target="_blank" rel="noopener"';
            return `<a class="lnk" href="${E(href)}"${ext}>${LABEL[k]}</a>`;
          })
          .join("");
      const tagline = E(P.tagline);

      const itemList = (arr, kind) =>
        `<ul class="items">${arr
          .map((e) => {
            const title =
              kind === "work"
                ? `${E(e.company)} <span class="role">· ${E(e.role)}</span>`
                : E(e.school || e.name);
            /* 逐段转义后过滤空值再拼:防 undefined / 悬空 " · " */
            const meta = (
              kind === "edu"
                ? [e.degree, e.note].map((s) => s && E(s))
                : [
                    (e.project || e.sub) && E(e.project || e.sub),
                    e.stack && e.stack.length
                      ? e.stack.map(E).join(" · ")
                      : "",
                  ]
            )
              .filter(Boolean)
              .join(" · ");
            const body = (e.bullets || [])
              .map((b) => `<p class="item-desc">${E(b)}</p>`)
              .join("");
            const url =
              e.url ||
              (kind === "proj" && e.repo
                ? `https://github.com/${P.githubUser}/${e.repo}`
                : "");
            const inner = `<div class="item-h"><span class="item-t">${title}</span><span class="item-when">${E(e.period)}</span></div><p class="item-meta">${meta}</p>${body}`;
            const isExtra =
              (kind === "work" && /Intern|Assistant/i.test(e.role || "")) ||
              (kind === "proj" && !e.featured);
            const liClass = isExtra ? ' class="is-extra"' : "";
            return `<li${liClass}>${
              url
                ? `<a class="item" href="${E(
                    url,
                  )}" target="_blank" rel="noopener">${inner}</a>`
                : `<div class="item">${inner}</div>`
            }</li>`;
          })
          .join("")}</ul>`;

      document.getElementById("app").innerHTML = `
      <header class="nav">
        <a href="#top" class="brand">${E(P.name)}</a>
        <div class="nav-right">
          <nav class="navlinks">
            <a href="#about">About</a><a href="#now">Now</a><a href="#experience">Experience</a><a href="#education">Education</a><a href="#projects">Projects</a><a href="#publications">Papers</a><a href="#certifications">Certifications</a><a href="#skills">Skills</a><a href="#map">Footprints</a>
          </nav>
          <button type="button" class="theme-toggle" aria-label="Toggle dark mode">
            <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
            <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
        </div>
      </header>
      <main id="top" tabindex="-1">
        <section class="hero">
          <h1 class="hero-title">${E(P.name)}</h1>
          <p class="kicker">${E(P.role)}<span class="kicker-sub">${P.company ? " · " + E(P.company) : ""} · ${E(P.location)}</span></p>
          <p class="hero-lead">${tagline}</p>
          <div class="links">${linkrow(["email", "github", "linkedin", "resume"])}</div>
        </section>

        <section class="block" id="about">
          <h2 class="block-h">About</h2>
          <div class="prose">
            ${P.about.map((p) => `<p>${E(p)}</p>`).join("")}
          </div>
        </section>

        ${
          P.now
            ? `<section class="block" id="now">
          <h2 class="block-h">Now</h2>
          <div class="prose">
            ${P.now
              .map((p) => `<p>${mdLink(E(p))}</p>`)
              .join("")}
          </div>
        </section>`
            : ""
        }

        <section class="block" id="experience">
          <h2 class="block-h">Experience</h2>
          ${itemList(P.experience, "work")}
          ${
            P.experience.some((e) => /Intern|Assistant/i.test(e.role || ""))
              ? `<button type="button" class="show-all-btn" data-more="Show all experience" aria-expanded="false">Show all experience <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="education">
          <h2 class="block-h">Education</h2>
          ${itemList(P.education, "edu")}
        </section>

        <section class="block" id="projects">
          <h2 class="block-h">Projects</h2>
          ${itemList(P.projects, "proj")}
          ${
            P.projects.some((p) => !p.featured)
              ? `<button type="button" class="show-all-btn" data-more="Show all projects" aria-expanded="false">Show all projects <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="publications">
          <h2 class="block-h">Papers</h2>
          <ul class="items">${P.publications
            .map(
              (p) => `<li><a class="item" href="${E(
                p.url,
              )}" target="_blank" rel="noopener"><div class="item-h"><span class="item-t">${E(
                p.title,
              )}</span><span class="item-when">${E(
                p.date,
              )}</span></div><p class="item-meta">${E(
                p.venue,
              )}</p><p class="item-desc">${E(p.note)}</p></a></li>`,
            )
            .join("")}</ul>
        </section>

        <section class="block" id="certifications">
          <h2 class="block-h">Certifications</h2>
          <ul class="items cert-grid">${P.certifications
            .map(
              (c) => `<li${c.featured ? "" : ' class="is-extra"'}><a class="item" href="${E(
                c.url,
              )}" target="_blank" rel="noopener"><div class="item-h"><span class="item-t">${E(
                c.name,
              )}</span><span class="item-when">${E(
                c.date,
              )}</span></div><p class="item-meta">${E(c.authority)}</p></a></li>`,
            )
            .join("")}</ul>
          ${
            P.certifications.some((c) => !c.featured)
              ? `<button type="button" class="show-all-btn" data-more="Show all certifications" aria-expanded="false">Show all certifications <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="skills">
          <h2 class="block-h">Skills</h2>
          <dl class="skills items">${Object.entries(P.skills)
            .map(
              ([c, t]) =>
                `<div class="skill${
                  P.skillsFeatured && !P.skillsFeatured.includes(c)
                    ? " is-extra"
                    : ""
                }"><dt>${E(c)}</dt><dd>${t
                  .map((s) => `<span class="tag">${E(s)}</span>`)
                  .join("")}</dd></div>`,
            )
            .join("")}</dl>
          ${
            P.skillsFeatured &&
            Object.keys(P.skills).some((c) => !P.skillsFeatured.includes(c))
              ? `<button type="button" class="show-all-btn" data-more="Show all skills" aria-expanded="false">Show all skills <span class="ar">→</span></button>`
              : ""
          }
        </section>

        <section class="block" id="map">
          <h2 class="block-h">Footprints</h2>
          <a class="fp" href="${E(P.footprints.href)}">
            <span class="fp-text">
              <span class="fp-title">${E(P.footprints.title)}</span>
              <span class="fp-meta">${E(P.footprints.meta)}</span>
            </span>
            <span class="more">Open the map <span class="ar">→</span></span>
          </a>
        </section>
      </main>
      <footer class="foot"><span>${E(P.name)} · ${E(P.location)}</span><span>© ${new Date().getFullYear()}</span></footer>`;

      // ---- dark / light theme toggle ----
      const themeBtn = document.querySelector(".theme-toggle");
      if (themeBtn) {
        const syncPressed = () =>
          themeBtn.setAttribute(
            "aria-pressed",
            document.documentElement.getAttribute("data-theme") === "dark"
              ? "true"
              : "false",
          );
        syncPressed();
        themeBtn.addEventListener("click", () => {
          const next =
            document.documentElement.getAttribute("data-theme") === "dark"
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", next);
          syncPressed();
          if (window.__syncThemeColor) window.__syncThemeColor(next);
          try {
            localStorage.setItem("theme", next);
          } catch (e) {}
        });
      }

      // ---- nav: 滚动后加发丝线(配合 0.95 材质,滚过的 hero 标题不透成灰渍) ----
      const navEl = document.querySelector(".nav");
      addEventListener(
        "scroll",
        () => navEl.classList.toggle("scrolled", scrollY > 8),
        { passive: true },
      );

      // ---- collapse toggles (experience internships, non-featured projects) ----
      document.querySelectorAll(".show-all-btn").forEach((btn) => {
        const sec = btn.closest("section");
        const list = sec && sec.querySelector(".items");
        if (!list) return;
        const more = btn.dataset.more || "Show all";
        btn.addEventListener("click", () => {
          const open = list.classList.toggle("show-all");
          btn.setAttribute("aria-expanded", open ? "true" : "false");
          btn.innerHTML = open
            ? 'Show fewer <span class="ar">↑</span>'
            : `${more} <span class="ar">→</span>`;
        });
      });
    </script>
  </body>
</html>
