<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 手机浏览器地址栏跟随昼夜变色(默认白天=海色;applyDayNight() 切夜时改深) -->
    <meta name="theme-color" content="#b9cdd0" />
    <link rel="icon" href="assets/icons/favicon.svg" />
    <title>Sherry's Footprints</title>
    <meta
      name="description"
      content="An interactive antique-style map tracing the places Sherry (Ke) Shi has lived and traveled."
    />
    <!-- 社交分享卡片(Open Graph / Twitter):分享地图链接时显示标题与简介 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sherry's Footprints" />
    <meta
      property="og:description"
      content="An interactive antique-style map tracing the places Sherry (Ke) Shi has lived and traveled."
    />
    <meta property="og:site_name" content="Sherry (Ke) Shi" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://kkkkshi.github.io/footprints.html" />
    <meta property="og:image" content="https://kkkkshi.github.io/og-image-map.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <link rel="canonical" href="https://kkkkshi.github.io/footprints.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://kkkkshi.github.io/og-image-map.png" />
    <meta name="twitter:title" content="Sherry's Footprints" />
    <meta
      name="twitter:description"
      content="An interactive antique-style map tracing the places Sherry (Ke) Shi has lived and traveled."
    />
    <!-- MapLibre 自托管(assets/vendor,SHA384 与原 unpkg SRI 校验一致):
         unpkg 在中国大陆常整站不可达,自托管后地图页不再依赖第三方 CDN -->
    <link
      href="assets/vendor/maplibre-gl-4.7.1/maplibre-gl.css"
      rel="stylesheet"
    />
    <!-- 字体自托管(assets/fonts/,由 Google Fonts 下载):国内访客不依赖 gstatic -->
    <link href="assets/fonts/fonts.css" rel="stylesheet" />
    <style>
      :root {
        --paper: #ece3cf;
        --paper2: #ddd0b2;
        --ink: #3a2f23;
        --ink2: #6b5a44;
        --sea: #b9cdd0;
        --marker: #9b2d20;
        --gold: #b89344;
        --goldhi: #e0c373;
        --golddk: #7c5f24;
        --mat: #ece3cf;
        --fell: "IM Fell English", "Songti SC", Georgia, serif;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: var(--fell);
        background: radial-gradient(130% 110% at 50% 32%, #342c20, #211b13);
      }
      #mapwrap {
        position: absolute;
        inset: 6px;
        overflow: hidden;
        box-shadow:
          0 10px 30px -10px rgba(12, 7, 2, 0.5),
          0 0 0 1.5px #b89344;
      }
      #map {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: var(--paper);
      }
      .maplibregl-canvas {
        filter: saturate(0.94) sepia(0.04);
      }
      #seal {
        cursor: pointer !important;
      }

      #rings {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        box-shadow:
          inset 0 0 0 7px var(--mat),
          inset 0 0 0 8px #b89344,
          inset 0 0 0 10px var(--mat),
          inset 0 0 0 11px #c9a85a;
      }
      #age {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: radial-gradient(
          135% 135% at 50% 46%,
          transparent 54%,
          rgba(120, 85, 45, 0.2) 100%
        );
        mix-blend-mode: multiply;
      }
      #light {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: radial-gradient(
          70% 60% at 50% 44%,
          rgba(255, 245, 220, 0.13),
          transparent 70%
        );
        mix-blend-mode: soft-light;
      }
      #grain {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0.08;
        mix-blend-mode: multiply;
      }
      .port {
        position: relative;
        width: 0;
        height: 0;
      }
      .port .pin {
        position: absolute;
        left: 0;
        top: 0;
        width: 15px;
        height: 15px;
        transform: translate(-50%, -50%) scale(var(--ps, 1));
        border: 2.2px solid var(--marker);
        border-radius: 50%;
        background: #efe7d2;
        box-shadow: 0 1px 2px rgba(30, 18, 4, 0.3);
        transition: transform 0.18s ease;
      }
      .port .pin::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 4px;
        height: 4px;
        background: var(--marker);
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .port .pin:hover {
        transform: translate(-50%, -50%) scale(calc(var(--ps, 1) * 1.25));
      }
      /* 上层节点(国家/省/市)用稍大的金心标记,区别于景点红点 */
      .port.area .pin {
        width: 17px;
        height: 17px;
        border-color: var(--golddk);
        background: #f3ead0;
      }
      .port.area .pin::after {
        background: var(--golddk);
      }
      /* 照片点与网图景点统一样式(用户定):不再用虚线圈区分,靠小注(N photos)自明 */
      .port .lbl {
        position: absolute;
        left: 12px;
        top: -8px;
        white-space: nowrap;
        font: italic 15px var(--fell);
        color: #7a2a1e;
        text-shadow:
          0 1px 0 rgba(236, 227, 207, 0.95),
          0 0 5px rgba(236, 227, 207, 1);
        pointer-events: none;
      }
      /* 城市名下的小注(只有能钻进去的容器点才有,如 "5 places"),古地图注记风 */
      .port .lbl small {
        display: block;
        font: italic 10.5px var(--fell);
        letter-spacing: 0.03em;
        color: var(--ink2);
      }
      /* 密集区被避让藏掉的名字:悬停圆点时临时显出来(放大后自然全显) */
      .port .pin:hover + .lbl {
        visibility: visible !important;
        z-index: 5;
      }
      /* 区域(国家/州)无圆点:文字居中、可点,点填色块或文字都进入 */
      .port.area .lbl {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font:
          600 13.5px "Cinzel",
          serif;
        letter-spacing: 0.04em;
        color: #4a3b2a;
        pointer-events: auto;
        cursor: pointer;
        text-shadow:
          0 0 7px rgba(236, 227, 207, 1),
          0 1px 0 rgba(236, 227, 207, 0.95);
      }
      .port.area .lbl:hover {
        color: #7a2a1e;
      }
      /* 世界层的远飞地群岛标注(如夏威夷):小一号,古图注记风,别抢国名 */
      .port.area.minor .lbl {
        font:
          600 10.5px "Cinzel",
          serif;
        letter-spacing: 0.06em;
        opacity: 0.88;
      }
      .port.area .cnt {
        left: 50%;
        top: calc(50% + 12px);
        transform: translateX(-50%);
        text-align: center;
      }
      .port .cnt {
        position: absolute;
        left: 12px;
        top: 9px;
        white-space: nowrap;
        font: italic 10px var(--fell);
        color: var(--ink2);
        opacity: 0.8;
        text-shadow: 0 1px 0 rgba(236, 227, 207, 0.9);
        pointer-events: none;
      }

      #compass {
        position: absolute;
        right: 26px;
        bottom: 26px;
        z-index: 6;
        width: 86px;
        height: 86px;
        pointer-events: none;
        filter: drop-shadow(0 2px 4px rgba(40, 30, 12, 0.35));
      }
      #scale {
        position: absolute;
        left: 28px;
        bottom: 28px;
        z-index: 6;
        pointer-events: none;
        opacity: 0.9;
      }
      /* 图例:比例尺上方一行古地图注记(点 / 航线 / 去过的填色) */
      #legend {
        position: absolute;
        left: 28px;
        bottom: 56px;
        z-index: 6;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 14px;
        font: italic 11.5px var(--fell);
        color: var(--ink2);
        opacity: 0.92;
        text-shadow: 0 1px 0 rgba(236, 227, 207, 0.9);
      }
      #legend i {
        display: inline-block;
        margin-right: 5px;
      }
      #legend .lg-pin {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        border: 1.8px solid var(--marker);
        background: #efe7d2;
        vertical-align: -1px;
      }
      #legend .lg-route {
        width: 20px;
        border-top: 1.6px dashed var(--marker);
        opacity: 0.75;
        vertical-align: 3px;
      }
      #legend .lg-gold {
        width: 13px;
        height: 9px;
        background: rgba(205, 171, 94, 0.45);
        border: 1px solid #8a6d3a;
        vertical-align: -1px;
      }
      /* BGM 署名(CC-BY 要求):比图例再淡一点,不抢戏 */
      #legend .lg-credit {
        opacity: 0.75;
        font-size: 10.5px;
      }
      @media (max-width: 640px) {
        #legend {
          display: none;
        }
      }
      #seal {
        position: absolute;
        left: 28px;
        top: 28px;
        z-index: 7;
        width: 74px;
        height: 74px;
        pointer-events: auto;
        filter: drop-shadow(0 2px 3px rgba(30, 12, 8, 0.5));
        transition:
          transform 0.16s ease,
          filter 0.2s;
      }
      #seal:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 3px 5px rgba(30, 12, 8, 0.5)) brightness(1.07);
      }
      #seal:active {
        transform: scale(0.93);
        transition: transform 0.08s ease;
        filter: drop-shadow(0 1px 2px rgba(30, 12, 8, 0.6)) brightness(1.07);
      }

      #title {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        pointer-events: none;
        text-align: center;
      }
      #title::before {
        content: "";
        position: absolute;
        z-index: -1;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 480px;
        height: 142px;
        background: transparent;
        -webkit-backdrop-filter: blur(9px);
        backdrop-filter: blur(9px);
        -webkit-mask-image: radial-gradient(
          ellipse 55% 50% at 50% 50%,
          #000 48%,
          transparent 100%
        );
        mask-image: radial-gradient(
          ellipse 55% 50% at 50% 50%,
          #000 48%,
          transparent 100%
        );
        pointer-events: none;
      }
      #title b {
        font: 600 27px var(--fell);
        letter-spacing: 0.06em;
        color: var(--ink);
        display: block;
        text-shadow:
          0 0 6px rgba(236, 227, 207, 0.9),
          0 1px 0 rgba(236, 227, 207, 0.9);
      }
      #title small {
        display: block;
        font: italic 13px var(--fell);
        letter-spacing: 0.26em;
        color: var(--ink2);
        margin-top: 5px;
        text-shadow: 0 0 6px rgba(236, 227, 207, 0.9);
      }
      .trule {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
      }
      .trule.top {
        margin-bottom: 8px;
      }
      .trule.bot {
        margin-top: 8px;
      }
      .trule .gl {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          #b89344 16%,
          #e0c373 50%,
          #b89344 84%,
          transparent
        );
      }
      .trule.top .gl {
        width: 150px;
      }
      .trule.bot .gl {
        width: 96px;
      }
      .trule .dia {
        color: #b89344;
        font-size: 7px;
        line-height: 1;
      }
      #stamp {
        position: absolute;
        right: 28px;
        top: 26px;
        z-index: 6;
        font: italic 12px var(--fell);
        color: var(--ink2);
        letter-spacing: 0.05em;
        pointer-events: none;
      }

      /* 面包屑导航(标题下方,避开标题花线) */
      #crumbs {
        position: absolute;
        top: 116px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 7;
        display: flex;
        gap: 7px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 70%;
        pointer-events: auto;
        font: italic 13px var(--fell);
        color: var(--ink2);
        text-shadow:
          0 0 5px rgba(236, 227, 207, 0.95),
          0 1px 0 rgba(236, 227, 207, 0.9);
      }
      #crumbs .cr {
        cursor: pointer;
        color: #7a2a1e;
      }
      #crumbs .cr:hover {
        color: #9b2d20;
      }
      #crumbs .sep {
        color: var(--gold);
      }
      #crumbs .cur {
        color: var(--ink);
        font-style: normal;
        font-weight: 600;
      }

      #music {
        position: absolute;
        left: 30px;
        top: 112px;
        z-index: 7;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-shadow: 0 1px 3px rgba(30, 18, 4, 0.35);
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.18s;
      }
      #music svg {
        width: 18px;
        height: 18px;
        overflow: visible;
      }
      #music:hover {
        background: #9b2d20;
        border-color: #6e1f16;
        transform: scale(1.08);
      }
      #music:active {
        transform: scale(0.95);
      }
      #music:hover .note {
        stroke: #f3ecd8;
      }
      #music:hover circle.note {
        fill: #f3ecd8;
      }
      #music::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 1.5px dashed var(--gold);
        opacity: 0;
        transition: opacity 0.25s;
      }
      #music.on::after {
        opacity: 0.95;
        animation: spin 3s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* 白天/夜晚切换 */
      #daynight {
        position: absolute;
        left: 30px;
        top: 150px;
        z-index: 7;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        color: var(--ink);
        box-shadow: 0 1px 3px rgba(30, 18, 4, 0.35);
        transition:
          background 0.2s,
          transform 0.18s;
      }
      #daynight:hover {
        background: #9b2d20;
        color: #f3ecd8;
        transform: scale(1.08);
      }
      #daynight svg {
        width: 17px;
        height: 17px;
      }
      /* 夜晚模式:文字/底色转浅,配合地图深色 */
      body.night {
        --ink: #ece0c2;
        --ink2: #b7a684;
        --marker: #c9604c; /* 标记/图例的印章红提亮一档,深底上才看得清 */
      }
      body.night #map {
        background: #0f1826;
      }
      body.night .port .lbl {
        color: #ecc06a;
        text-shadow:
          0 0 6px rgba(10, 16, 26, 0.95),
          0 1px 0 rgba(10, 16, 26, 0.8);
      }
      body.night .port.area .lbl {
        color: #e0cf9c;
        text-shadow: 0 0 7px rgba(10, 16, 26, 0.95);
      }
      body.night #title b {
        text-shadow: 0 0 10px rgba(10, 16, 26, 0.9);
      }
      body.night #title small,
      body.night #stamp {
        text-shadow: 0 0 8px rgba(10, 16, 26, 0.9);
      }
      body.night #daynight {
        background: rgba(20, 30, 46, 0.85);
        color: #e7c25c;
      }
      /* 夜晚:其余浮层同步转深 —— 左侧按钮(亮底看不清图标)、面包屑(亮光晕发怪)、
         卡片/toast(羊皮纸大亮块)。金色线框保留,古图气质不变 */
      body.night #music,
      body.night #links a {
        background: rgba(20, 30, 46, 0.85);
        color: #e7c25c;
      }
      body.night #music .note {
        stroke: #e7c25c;
      }
      body.night #music circle.note {
        fill: #e7c25c;
      }
      body.night #crumbs {
        text-shadow:
          0 0 5px rgba(10, 16, 26, 0.95),
          0 1px 0 rgba(10, 16, 26, 0.9);
      }
      body.night #crumbs .cr {
        color: #d99a6c;
      }
      body.night #crumbs .cr:hover {
        color: #ecc06a;
      }
      body.night #years button,
      body.night #yearlist {
        text-shadow: 0 0 5px rgba(10, 16, 26, 0.95);
      }
      /* 夜晚 pin 全金(用户定):白天红圈好看,夜里"白圈红圈白心"像 target 图标 */
      body.night .port .pin {
        border-color: #e7c25c;
        background: #232f42;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      body.night .port .pin::after {
        background: #e7c25c;
      }
      body.night #legend .lg-pin {
        border-color: #e7c25c;
        background: #232f42;
      }
      body.night #legend .lg-route {
        border-top-color: #ec9a82;
      }
      body.night #card {
        background: linear-gradient(
          rgba(26, 37, 52, 0.88),
          rgba(19, 29, 44, 0.88)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 250, 235, 0.08),
          0 0 0 3px rgba(10, 16, 26, 0.5),
          0 1px 2px rgba(0, 0, 0, 0.3),
          0 14px 30px -10px rgba(0, 0, 0, 0.6);
      }
      body.night #card .photo {
        background: repeating-linear-gradient(
          45deg,
          #1b2635,
          #1b2635 6px,
          #16202e 6px,
          #16202e 12px
        );
      }
      body.night #card .ph-prev,
      body.night #card .ph-next {
        background: rgba(20, 30, 46, 0.95);
        color: #e7c25c;
      }
      body.night #toast {
        background: linear-gradient(#1a2534, #131d2c);
        outline-color: rgba(10, 16, 26, 0.6);
        color: #cdbb96;
      }
      /* 夜晚:自定义鼠标转浅(白天深墨色在深色海面上看不见) */
      body.night #cursor {
        color: #ece0c2;
      }
      body.night #cursor.hot {
        color: #ecc06a;
      }

      #links {
        position: absolute;
        left: 30px;
        top: 190px;
        z-index: 7;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #links a {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        box-shadow: 0 1px 3px rgba(30, 18, 4, 0.35);
        transition:
          background 0.2s,
          color 0.2s,
          transform 0.18s;
      }
      #links a svg {
        width: 16px;
        height: 16px;
      }
      #links a:hover {
        background: #9b2d20;
        border-color: #6e1f16;
        color: #f3ecd8;
        transform: scale(1.08);
      }
      /* 触摸热区：透明 ::before 把可点区域 30→~38（控件间距仅 8px，全 44 会重叠，38 折中）。
         #music 已有 ::after 虚线环提供同等热区，无需另加。视觉不变。 */
      #links a {
        position: relative;
      }
      #daynight::before,
      #links a::before {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
      }

      #toast {
        position: fixed;
        z-index: 20;
        max-width: 240px;
        padding: 9px 13px;
        background: linear-gradient(#f3ecd8, #ece1c4);
        border: 1px solid #6b5a3e;
        outline: 2px solid rgba(236, 227, 207, 0.6);
        box-shadow: 0 8px 22px rgba(30, 18, 4, 0.42);
        font: italic 13px var(--fell);
        color: #5a4632;
        line-height: 1.45;
        opacity: 0;
        visibility: hidden;
        transform: translateX(-6px);
        transition:
          opacity 0.2s ease,
          transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
        pointer-events: none;
      }
      #toast.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(0);
        pointer-events: auto;
      }
      #toast .copyable {
        color: #7a2a1e;
        font-style: normal;
        cursor: pointer;
      }
      #toast .copyable:hover {
        color: #9b2d20;
      }

      #cursor {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 30;
        pointer-events: none;
        color: #3a2f23;
        transform: translate(-100px, -100px);
        display: none;
      }
      html.ccursor #cursor {
        display: block;
      }
      html.ccursor,
      html.ccursor * {
        cursor: none !important;
      }
      #cursor svg {
        display: block;
        margin: -11px 0 0 -11px;
        transition:
          transform 0.18s cubic-bezier(0.2, 0.8, 0.3, 1),
          color 0.15s;
      }
      #cursor.hot {
        color: #9b2d20;
      }
      #cursor.hot svg {
        transform: scale(1.9);
      }

      @property --hole {
        syntax: "<percentage>";
        inherits: false;
        initial-value: 0%;
      }
      #intro {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        --hole: 0%;
        background: radial-gradient(
          120% 105% at 50% 45%,
          #e9e0c9,
          #d6c9a7 68%,
          #c4b389
        );
        box-shadow: inset 0 0 60px rgba(120, 85, 45, 0.25);
        -webkit-mask: radial-gradient(
          circle at 50% 50%,
          transparent var(--hole),
          #000 calc(var(--hole) + 0.6%)
        );
        mask: radial-gradient(
          circle at 50% 50%,
          transparent var(--hole),
          #000 calc(var(--hole) + 0.6%)
        );
      }

      /* 年份带(底部居中) */
      #years {
        position: absolute;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        z-index: 7;
        display: flex;
        gap: 4px;
        /* 按文字基线对齐:‹›(21px)和年份(13px)行盒不同高,盒子居中会错位 */
        align-items: baseline;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 76%;
        pointer-events: auto;
      }
      #years::before {
        content: "";
        position: absolute;
        z-index: -1;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: calc(100% + 90px);
        /* 随内容长高(选中年份时上方多一行地点),单行时 ≈ 原 64px */
        height: calc(100% + 38px);
        background: transparent;
        -webkit-backdrop-filter: blur(9px);
        backdrop-filter: blur(9px);
        -webkit-mask-image: radial-gradient(
          ellipse 60% 52% at 50% 50%,
          #000 50%,
          transparent 100%
        );
        mask-image: radial-gradient(
          ellipse 60% 52% at 50% 50%,
          #000 50%,
          transparent 100%
        );
        pointer-events: none;
      }
      #years button {
        font-family: var(--fell);
        cursor: pointer;
        background: none;
        border: none;
        padding: 3px 7px;
        font:
          italic 13px "Cinzel",
          serif;
        color: var(--ink2);
        opacity: 0.55;
        transition:
          opacity 0.2s,
          color 0.2s;
        letter-spacing: 0.03em;
        text-shadow: 0 0 5px rgba(236, 227, 207, 0.95);
      }
      #years button:hover {
        opacity: 0.85;
      }
      #years button.on {
        opacity: 1;
        color: #7a2a1e;
        font-weight: 600;
      }
      /* 翻页箭头(‹ 往前退到更早年份,› 翻回更近),到头自动消失;
         比年份按钮大且深(用户反馈 15px/0.55 透明度根本看不见) */
      #years button.pg {
        font-style: normal;
        font-size: 21px;
        line-height: 1;
        padding: 3px 8px;
        /* 实测墨迹:‹ 中心在基线上方 7px,数字 5px → 下移 2px 令视觉中线重合 */
        transform: translateY(2px);
        color: var(--ink);
        opacity: 0.8;
      }
      #years button.pg:hover {
        opacity: 1;
      }
      /* 收起态(默认):整条年份带只留一枚 "Years ▾" 开关,点开才展开
         (用户定:一开始不用全部摆出来) */
      #years:not(.open) button:not(.tg) {
        display: none;
      }
      #years button.tg {
        opacity: 0.75;
      }
      /* 选中某年时,在年份带上方一行列出那年去过的地方(黄色块粒度) */
      #yearlist {
        flex-basis: 100%;
        text-align: center;
        font: italic 12.5px var(--fell);
        color: var(--ink2);
        letter-spacing: 0.04em;
        text-shadow: 0 0 5px rgba(236, 227, 207, 0.95);
        margin-bottom: 3px;
      }
      /* 移动端：年份带放宽到 2 行（原 3 行 106px 挡地图），不缩按钮保 tap 尺寸 */
      @media (max-width: 700px) {
        #years {
          width: 92%;
          max-width: 92%;
          gap: 4px;
        }
        #years::before {
          width: calc(100% + 24px);
          height: calc(100% + 16px);
        }
        /* 故事卡：窄屏从「固定 300px 靠右、左缘只剩 ~62px」改成近全宽底部抽屉（年份带上方，自下滑入）。
           用 `body #card` 提特异性——本 @media 块位于 #card 基础规则之前，同特异性会被覆盖。 */
        body #card {
          left: 12px;
          right: 12px;
          width: auto;
          top: auto;
          bottom: 84px;
          transform: translateY(18px);
        }
        body #card.show {
          transform: translateY(0);
        }
      }

      /* 键盘可达:焦点环 — 仅键盘 Tab 导航时可见,鼠标用户与古海图观感不受影响 */
      #music:focus-visible,
      #daynight:focus-visible {
        outline: 2px solid var(--goldhi);
        outline-offset: 3px;
      }
      #links a:focus-visible,
      #years button:focus-visible {
        outline: 2px solid var(--goldhi);
        outline-offset: 2px;
        border-radius: 6px;
      }
      /* 地图节点(城市 pin / 区域标签)键盘聚焦环 */
      .port .pin:focus-visible,
      .port.area .lbl:focus-visible {
        outline: 2px solid var(--goldhi);
        outline-offset: 3px;
        border-radius: 6px;
      }
      /* 导航控件键盘聚焦环:面包屑(退层)与火漆印章(回首页) */
      #crumbs .cr:focus-visible {
        outline: 2px solid var(--goldhi);
        outline-offset: 2px;
        border-radius: 6px;
      }
      #seal:focus-visible {
        outline: 2px solid var(--goldhi);
        outline-offset: 2px;
        border-radius: 50%;
      }

      #card {
        position: absolute;
        right: 28px;
        top: 50%;
        transform: translateY(-50%) translateX(12px);
        z-index: 8;
        width: 360px;
        pointer-events: auto;
        background: linear-gradient(
          rgba(243, 236, 216, 0.84),
          rgba(236, 225, 196, 0.84)
        );
        -webkit-backdrop-filter: saturate(140%) blur(20px);
        backdrop-filter: saturate(140%) blur(20px);
        border: 1px solid #6b5a3e;
        border-radius: 10px;
        box-shadow:
          inset 0 1px 0 rgba(255, 250, 235, 0.5),
          0 0 0 3px rgba(236, 227, 207, 0.5),
          0 1px 2px rgba(30, 18, 4, 0.12),
          0 14px 30px -10px rgba(30, 18, 4, 0.42);
        padding: 16px 18px;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.24s ease,
          transform 0.26s cubic-bezier(0.34, 1.4, 0.64, 1);
      }
      #card.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(-50%) translateX(0);
      }
      #card h3 {
        font:
          600 18px "Cinzel",
          serif;
        color: var(--ink);
        margin: 0 0 3px;
        white-space: normal;
        word-break: break-word;
        line-height: 1.22;
        min-height: 1.3em;
      }
      #card .coord {
        font:
          10px ui-monospace,
          monospace;
        color: var(--ink2);
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      #card .photo {
        margin-top: 4px;
        height: 56px;
        border: 1px solid var(--gold);
        background: repeating-linear-gradient(
          45deg,
          #e2d6b4,
          #e2d6b4 6px,
          #dccda6 6px,
          #dccda6 12px
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font: italic 11px var(--fell);
        color: var(--ink2);
      }
      /* 有网图时:金边装裱,整幅显示、任何方向都不裁剪——
         相框收缩到与图同宽(fit-content)居中,两侧不留衬纸边 */
      #card .photo.has-img {
        position: relative;
        height: auto;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
        padding: 2px;
        background: #e2d6b4; /* 只剩 2px 装裱缝的底色 */
      }
      #card .photo.has-img img {
        display: block;
        width: auto;
        height: auto;
        /* 320 = 卡片 360 - 左右内边距 36 - 框缝 4(卡片宽度变了要同步) */
        max-width: 320px;
        max-height: min(380px, 48vh);
        filter: saturate(0.9) sepia(0.12); /* 轻做旧,融入羊皮纸 */
      }
      /* 容器城市卡的图位:不放图,放"点击进入"面板。
         底色 = 地图陆地羊皮纸色(--paper #ece3cf,和背景一个颜色);
         悬停只加深一档羊皮纸,不变红(用户定) */
      #card .photo.enter {
        height: 64px;
        padding: 0 16px;
        cursor: pointer;
        background: #ece3cf;
        border-color: rgba(184, 147, 68, 0.5);
        font: italic 13px var(--fell);
        color: #7a2a1e;
        transition:
          background 0.18s,
          border-color 0.18s;
      }
      #card .photo.enter:hover {
        background: #e2d6b4;
        border-color: var(--gold);
      }
      /* ‹› 切换按钮:挂在卡片左右边缘中线(卡片垂直居中 → 屏幕位置固定,
         图无论横竖大小都能在同一个点连点快速浏览);圆点仍在图底部 */
      #card .ph-prev,
      #card .ph-next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.95);
        color: #7a2a1e;
        font: 16px/1 var(--fell);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 0 2px;
        box-shadow: 0 2px 6px rgba(30, 18, 4, 0.18);
        transition:
          background 0.18s,
          color 0.18s;
      }
      #card .ph-prev {
        left: -14px;
      }
      #card .ph-next {
        right: -14px;
      }
      #card .ph-prev:hover,
      #card .ph-next:hover {
        background: var(--gold);
        color: #fff;
      }
      #card .ph-dots {
        position: absolute;
        left: 50%;
        bottom: 8px;
        transform: translateX(-50%);
        display: flex;
        gap: 5px;
      }
      #card .ph-dots i {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(236, 227, 207, 0.8);
        border: 1px solid rgba(122, 42, 30, 0.55);
      }
      #card .ph-dots i.on {
        background: var(--marker, #9b2d20);
        border-color: #9b2d20;
      }
      #loadtip {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 25;
        font: italic 14px var(--fell);
        color: #6b5a44;
        background: rgba(236, 227, 207, 0.92);
        padding: 10px 16px;
        border: 1px solid var(--gold);
        box-shadow: 0 2px 8px rgba(30, 18, 4, 0.3);
        pointer-events: none;
      }
    </style>
  </head>
