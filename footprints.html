<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Mobile browser address bar follows day/night (default day = sea color; applyDayNight() darkens it at night) -->
    <meta name="theme-color" content="#b9cdd0" />
    <link rel="icon" href="assets/icons/favicon.svg" />
    <title>Sherry's Footprints</title>
    <meta
      name="description"
      content="An interactive antique-style map tracing the places Sherry (Ke) Shi has lived and traveled."
    />
    <!-- Social share card (Open Graph / Twitter): title and blurb shown when the map link is shared -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sherry's Footprints" />
    <meta
      property="og:description"
      content="An interactive antique-style map tracing the places Sherry (Ke) Shi has lived and traveled."
    />
    <meta property="og:site_name" content="Sherry (Ke) Shi" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://kkkkshi.github.io/footprints.html" />
    <meta property="og:image" content="https://kkkkshi.github.io/og-image-map.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <link rel="canonical" href="https://kkkkshi.github.io/footprints.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://kkkkshi.github.io/og-image-map.png" />
    <meta name="twitter:title" content="Sherry's Footprints" />
    <meta
      name="twitter:description"
      content="An interactive antique-style map tracing the places Sherry (Ke) Shi has lived and traveled."
    />
    <!-- MapLibre self-hosted (assets/vendor, SHA384 matches the original unpkg SRI):
         unpkg is often unreachable in mainland China; self-hosting removes the third-party CDN dependency -->
    <link
      href="assets/vendor/maplibre-gl-4.7.1/maplibre-gl.css"
      rel="stylesheet"
    />
    <!-- Fonts self-hosted (assets/fonts/, downloaded from Google Fonts): visitors in China don't depend on gstatic -->
    <link href="assets/fonts/fonts.css" rel="stylesheet" />
    <style>
      :root {
        --paper: #ece3cf;
        --paper2: #ddd0b2;
        --ink: #3a2f23;
        --ink2: #6b5a44;
        --sea: #b9cdd0;
        --marker: #9b2d20;
        --gold: #b89344;
        --goldhi: #e0c373;
        --golddk: #7c5f24;
        --mat: #ece3cf;
        --fell: "IM Fell English", "Songti SC", Georgia, serif;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      /* iOS Safari: page-level pinch/double-tap zoom persists across reloads (WebKit stores the
         scale on the history item), and the touch-action:none map canvas then swallows every
         pinch-out — the page gets stuck zoomed. Forbid page zoom from every gesture entry point
         (overlays + the 6px body frame; the canvas is already covered by MapLibre's own
         touch-action:none). Safari's Aa "Page Zoom" remains available for accessibility. */
      html,
      body,
      #seal,
      #crumbs,
      #music,
      #daynight,
      #links,
      #years,
      #card,
      #toast {
        touch-action: pan-x pan-y;
      }
      .yr-wheel-track {
        touch-action: pan-y; /* keep the year wheel's own vertical scroll */
      }
      body {
        font-family: var(--fell);
        background: radial-gradient(130% 110% at 50% 32%, #342c20, #211b13);
      }
      #mapwrap {
        position: absolute;
        inset: 6px;
        overflow: hidden;
        box-shadow:
          0 10px 30px -10px rgba(12, 7, 2, 0.5),
          0 0 0 1.5px #b89344;
      }
      #map {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: var(--paper);
      }
      .maplibregl-canvas {
        filter: saturate(0.94) sepia(0.04);
      }
      #seal {
        cursor: pointer !important;
      }

      #rings {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        box-shadow:
          inset 0 0 0 7px var(--mat),
          inset 0 0 0 8px #b89344,
          inset 0 0 0 10px var(--mat),
          inset 0 0 0 11px #c9a85a;
      }
      #age {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: radial-gradient(
          135% 135% at 50% 46%,
          transparent 54%,
          rgba(120, 85, 45, 0.2) 100%
        );
        mix-blend-mode: multiply;
      }
      #light {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: radial-gradient(
          70% 60% at 50% 44%,
          rgba(255, 245, 220, 0.13),
          transparent 70%
        );
        mix-blend-mode: soft-light;
      }
      #grain {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0.08;
        mix-blend-mode: multiply;
      }
      .port {
        position: relative;
        width: 0;
        height: 0;
      }
      .port .pin {
        position: absolute;
        left: 0;
        top: 0;
        width: 15px;
        height: 15px;
        transform: translate(-50%, -50%) scale(var(--ps, 1));
        border: 2.2px solid var(--marker);
        border-radius: 50%;
        background: #efe7d2;
        box-shadow: 0 1px 2px rgba(30, 18, 4, 0.3);
        transition: transform 0.18s ease;
      }
      .port .pin::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 4px;
        height: 4px;
        background: var(--marker);
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .port .pin:hover {
        transform: translate(-50%, -50%) scale(calc(var(--ps, 1) * 1.25));
      }
      /* Upper-level nodes (country/region/city): slightly larger gold-center marker, distinct from red spot dots */
      .port.area .pin {
        width: 17px;
        height: 17px;
        border-color: var(--golddk);
        background: #f3ead0;
      }
      .port.area .pin::after {
        background: var(--golddk);
      }
      /* Photo spots and web-image attractions share one style (user decision): no dashed-ring distinction; the small note (N photos) speaks for itself */
      .port .lbl {
        position: absolute;
        left: 12px;
        top: -8px;
        white-space: nowrap;
        font: italic 15px var(--fell);
        color: #7a2a1e;
        text-shadow:
          0 1px 0 rgba(236, 227, 207, 0.95),
          0 0 5px rgba(236, 227, 207, 1);
        pointer-events: none;
      }
      /* Small note under a city name (only on drillable container points, e.g. "5 places"), antique-map annotation style */
      .port .lbl small {
        display: block;
        font: italic 10.5px var(--fell);
        letter-spacing: 0.03em;
        color: var(--ink2);
      }
      /* Names hidden by decluttering in dense areas: shown temporarily on dot hover (all appear naturally once zoomed in) */
      .port .pin:hover + .lbl {
        visibility: visible !important;
        z-index: 5;
      }
      /* Areas (country/state) have no dot: centered clickable text; clicking the fill or the text both enter */
      .port.area .lbl {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font:
          600 13.5px "Cinzel",
          serif;
        letter-spacing: 0.04em;
        color: #4a3b2a;
        pointer-events: auto;
        cursor: pointer;
        text-shadow:
          0 0 7px rgba(236, 227, 207, 1),
          0 1px 0 rgba(236, 227, 207, 0.95);
      }
      .port.area .lbl:hover {
        color: #7a2a1e;
      }
      /* World-level labels for remote island exclaves (e.g. Hawaii): one size smaller, antique annotation style, must not upstage country names */
      .port.area.minor .lbl {
        font:
          600 10.5px "Cinzel",
          serif;
        letter-spacing: 0.06em;
        opacity: 0.88;
      }
      .port.area .cnt {
        left: 50%;
        top: calc(50% + 12px);
        transform: translateX(-50%);
        text-align: center;
      }
      .port .cnt {
        position: absolute;
        left: 12px;
        top: 9px;
        white-space: nowrap;
        font: italic 10px var(--fell);
        color: var(--ink2);
        opacity: 0.8;
        text-shadow: 0 1px 0 rgba(236, 227, 207, 0.9);
        pointer-events: none;
      }

      #compass {
        position: absolute;
        right: 26px;
        bottom: 26px;
        z-index: 6;
        width: 86px;
        height: 86px;
        pointer-events: none;
        filter: drop-shadow(0 2px 4px rgba(40, 30, 12, 0.35));
      }
      #scale {
        position: absolute;
        left: 28px;
        bottom: 28px;
        z-index: 6;
        pointer-events: none;
        opacity: 0.9;
      }
      /* Legend: one antique-style annotation line above the scale bar (dot / route / visited fill) */
      #legend {
        position: absolute;
        left: 28px;
        bottom: 56px;
        z-index: 6;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 14px;
        font: italic 11.5px var(--fell);
        color: var(--ink2);
        opacity: 0.92;
        text-shadow: 0 1px 0 rgba(236, 227, 207, 0.9);
      }
      #legend i {
        display: inline-block;
        margin-right: 5px;
      }
      #legend .lg-pin {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        border: 1.8px solid var(--marker);
        background: #efe7d2;
        vertical-align: -1px;
      }
      #legend .lg-route {
        width: 20px;
        border-top: 1.6px dashed var(--marker);
        opacity: 0.75;
        vertical-align: 3px;
      }
      #legend .lg-gold {
        width: 13px;
        height: 9px;
        background: rgba(205, 171, 94, 0.45);
        border: 1px solid #8a6d3a;
        vertical-align: -1px;
      }
      /* BGM credit (CC-BY requirement): a bit fainter than the legend, unobtrusive */
      #legend .lg-credit {
        opacity: 0.75;
        font-size: 10.5px;
      }
      @media (max-width: 640px) {
        #legend {
          display: none;
        }
      }
      #seal {
        position: absolute;
        left: 28px;
        top: 28px;
        z-index: 7;
        width: 74px;
        height: 74px;
        pointer-events: auto;
        filter: drop-shadow(0 2px 3px rgba(30, 12, 8, 0.5));
        transition:
          transform 0.16s ease,
          filter 0.2s;
      }
      #seal:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 3px 5px rgba(30, 12, 8, 0.5)) brightness(1.07);
      }
      #seal:active {
        transform: scale(0.93);
        transition: transform 0.08s ease;
        filter: drop-shadow(0 1px 2px rgba(30, 12, 8, 0.6)) brightness(1.07);
      }

      #title {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        pointer-events: none;
        text-align: center;
      }
      #title::before {
        content: "";
        position: absolute;
        z-index: -1;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 480px;
        height: 142px;
        background: transparent;
        -webkit-backdrop-filter: blur(9px);
        backdrop-filter: blur(9px);
        -webkit-mask-image: radial-gradient(
          ellipse 55% 50% at 50% 50%,
          #000 48%,
          transparent 100%
        );
        mask-image: radial-gradient(
          ellipse 55% 50% at 50% 50%,
          #000 48%,
          transparent 100%
        );
        pointer-events: none;
      }
      #title b {
        font: 600 27px var(--fell);
        letter-spacing: 0.06em;
        color: var(--ink);
        display: block;
        text-shadow:
          0 0 6px rgba(236, 227, 207, 0.9),
          0 1px 0 rgba(236, 227, 207, 0.9);
      }
      #title small {
        display: block;
        font: italic 13px var(--fell);
        letter-spacing: 0.26em;
        color: var(--ink2);
        margin-top: 5px;
        text-shadow: 0 0 6px rgba(236, 227, 207, 0.9);
      }
      .trule {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
      }
      .trule.top {
        margin-bottom: 8px;
      }
      .trule.bot {
        margin-top: 8px;
      }
      .trule .gl {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          #b89344 16%,
          #e0c373 50%,
          #b89344 84%,
          transparent
        );
      }
      .trule.top .gl {
        width: 150px;
      }
      .trule.bot .gl {
        width: 96px;
      }
      .trule .dia {
        color: #b89344;
        font-size: 7px;
        line-height: 1;
      }
      #stamp {
        position: absolute;
        right: 28px;
        top: 26px;
        z-index: 6;
        font: italic 12px var(--fell);
        color: var(--ink2);
        letter-spacing: 0.05em;
        pointer-events: none;
      }

      /* Breadcrumb nav (below the title, clear of its ornamental rules) */
      #crumbs {
        position: absolute;
        top: 116px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 7;
        display: flex;
        gap: 7px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 70%;
        pointer-events: auto;
        font: italic 13px var(--fell);
        color: var(--ink2);
        text-shadow:
          0 0 5px rgba(236, 227, 207, 0.95),
          0 1px 0 rgba(236, 227, 207, 0.9);
      }
      #crumbs .cr {
        cursor: pointer;
        color: #7a2a1e;
      }
      #crumbs .cr:hover {
        color: #9b2d20;
      }
      #crumbs .sep {
        color: var(--gold);
      }
      #crumbs .cur {
        color: var(--ink);
        font-style: normal;
        font-weight: 600;
      }

      #music {
        position: absolute;
        left: 30px;
        top: 112px;
        z-index: 7;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-shadow: 0 1px 3px rgba(30, 18, 4, 0.35);
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.18s;
      }
      #music svg {
        width: 18px;
        height: 18px;
        overflow: visible;
      }
      #music:hover {
        background: #9b2d20;
        border-color: #6e1f16;
        transform: scale(1.08);
      }
      #music:active {
        transform: scale(0.95);
      }
      #music:hover .note {
        stroke: #f3ecd8;
      }
      #music:hover circle.note {
        fill: #f3ecd8;
      }
      #music::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 1.5px dashed var(--gold);
        opacity: 0;
        transition: opacity 0.25s;
      }
      #music.on::after {
        opacity: 0.95;
        animation: spin 3s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Day/night toggle */
      #daynight {
        position: absolute;
        left: 30px;
        top: 150px;
        z-index: 7;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        color: var(--ink);
        box-shadow: 0 1px 3px rgba(30, 18, 4, 0.35);
        transition:
          background 0.2s,
          transform 0.18s;
      }
      #daynight:hover {
        background: #9b2d20;
        color: #f3ecd8;
        transform: scale(1.08);
      }
      #daynight svg {
        width: 17px;
        height: 17px;
      }
      /* Night mode: text/backgrounds lighten to match the dark map */
      body.night {
        --ink: #ece0c2;
        --ink2: #b7a684;
        --marker: #c9604c; /* marker/legend seal red brightened one step to read on dark ground */
      }
      body.night #map {
        background: #0f1826;
      }
      body.night .port .lbl {
        color: #ecc06a;
        text-shadow:
          0 0 6px rgba(10, 16, 26, 0.95),
          0 1px 0 rgba(10, 16, 26, 0.8);
      }
      body.night .port.area .lbl {
        color: #e0cf9c;
        text-shadow: 0 0 7px rgba(10, 16, 26, 0.95);
      }
      body.night #title b {
        text-shadow: 0 0 10px rgba(10, 16, 26, 0.9);
      }
      body.night #title small,
      body.night #stamp {
        text-shadow: 0 0 8px rgba(10, 16, 26, 0.9);
      }
      body.night #daynight {
        background: rgba(20, 30, 46, 0.85);
        color: #e7c25c;
      }
      /* Night: remaining overlays darken too — left buttons (icons unreadable on light ground), breadcrumbs (light halo looks odd),
         card/toast (big bright parchment blocks). Gold outlines stay; antique feel unchanged */
      body.night #music,
      body.night #links a {
        background: rgba(20, 30, 46, 0.85);
        color: #e7c25c;
      }
      body.night #music .note {
        stroke: #e7c25c;
      }
      body.night #music circle.note {
        fill: #e7c25c;
      }
      body.night #crumbs {
        text-shadow:
          0 0 5px rgba(10, 16, 26, 0.95),
          0 1px 0 rgba(10, 16, 26, 0.9);
      }
      body.night #crumbs .cr {
        color: #d99a6c;
      }
      body.night #crumbs .cr:hover {
        color: #ecc06a;
      }
      body.night #years button,
      body.night #yearlist {
        text-shadow: 0 0 5px rgba(10, 16, 26, 0.95);
      }
      /* Night pins all gold (user decision): red rings look good by day, but at night "white ring, red ring, white center" reads like a target icon */
      body.night .port .pin {
        border-color: #e7c25c;
        background: #232f42;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      body.night .port .pin::after {
        background: #e7c25c;
      }
      body.night #legend .lg-pin {
        border-color: #e7c25c;
        background: #232f42;
      }
      body.night #legend .lg-route {
        border-top-color: #ec9a82;
      }
      body.night #card {
        background: linear-gradient(
          rgba(26, 37, 52, 0.88),
          rgba(19, 29, 44, 0.88)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 250, 235, 0.08),
          0 0 0 3px rgba(10, 16, 26, 0.5),
          0 1px 2px rgba(0, 0, 0, 0.3),
          0 14px 30px -10px rgba(0, 0, 0, 0.6);
      }
      body.night #card .photo {
        background: repeating-linear-gradient(
          45deg,
          #1b2635,
          #1b2635 6px,
          #16202e 6px,
          #16202e 12px
        );
      }
      body.night #card .ph-prev,
      body.night #card .ph-next {
        background: rgba(20, 30, 46, 0.95);
        color: #e7c25c;
      }
      body.night #toast {
        background: linear-gradient(#1a2534, #131d2c);
        outline-color: rgba(10, 16, 26, 0.6);
        color: #cdbb96;
      }
      /* Night: custom cursor lightens (day's dark ink is invisible on the dark sea) */
      body.night #cursor {
        color: #ece0c2;
      }
      body.night #cursor.hot {
        color: #ecc06a;
      }

      #links {
        position: absolute;
        left: 30px;
        top: 190px;
        z-index: 7;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #links a {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        box-shadow: 0 1px 3px rgba(30, 18, 4, 0.35);
        transition:
          background 0.2s,
          color 0.2s,
          transform 0.18s;
      }
      #links a svg {
        width: 16px;
        height: 16px;
      }
      #links a:hover {
        background: #9b2d20;
        border-color: #6e1f16;
        color: #f3ecd8;
        transform: scale(1.08);
      }
      /* Touch hit area: transparent ::before grows the tap target 30→~38 (controls sit only 8px apart; a full 44 would overlap, 38 is the compromise).
         #music's ::after dashed ring already provides the same hit area, nothing extra needed. No visual change. */
      #links a {
        position: relative;
      }
      #daynight::before,
      #links a::before {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
      }

      #toast {
        position: fixed;
        z-index: 20;
        max-width: 240px;
        padding: 9px 13px;
        background: linear-gradient(#f3ecd8, #ece1c4);
        border: 1px solid #6b5a3e;
        outline: 2px solid rgba(236, 227, 207, 0.6);
        box-shadow: 0 8px 22px rgba(30, 18, 4, 0.42);
        font: italic 13px var(--fell);
        color: #5a4632;
        line-height: 1.45;
        opacity: 0;
        visibility: hidden;
        transform: translateX(-6px);
        transition:
          opacity 0.2s ease,
          transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
        pointer-events: none;
      }
      #toast.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(0);
        pointer-events: auto;
      }
      #toast .copyable {
        color: #7a2a1e;
        font-style: normal;
        cursor: pointer;
      }
      #toast .copyable:hover {
        color: #9b2d20;
      }

      #cursor {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 30;
        pointer-events: none;
        color: #3a2f23;
        transform: translate(-100px, -100px);
        display: none;
      }
      html.ccursor #cursor {
        display: block;
      }
      html.ccursor,
      html.ccursor * {
        cursor: none !important;
      }
      #cursor svg {
        display: block;
        margin: -11px 0 0 -11px;
        transition:
          transform 0.18s cubic-bezier(0.2, 0.8, 0.3, 1),
          color 0.15s;
      }
      #cursor.hot {
        color: #9b2d20;
      }
      #cursor.hot svg {
        transform: scale(1.9);
      }

      @property --hole {
        syntax: "<percentage>";
        inherits: false;

      #intro {

          transparent var(--hole),
          #000 calc(var(--hole) + 0.6%)

          circle at 50% 50%,
          transparent var(--hole),
          #000 calc(var(--hole) + 0.6%)
        );

      /* Year strip (bottom center) */
      #years {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 22px;
        margin: 0 auto;
        /* Center a content-hugging box via auto margins (not left:50%+translateX, which would cap the
           shrink-to-fit width at "midline → right edge" and force the strip to wrap on narrow screens) */
        width: -moz-fit-content;
        width: fit-content;
        z-index: 7;
        display: flex;
        gap: 4px;
        /* Align by text baseline: ‹› (21px) and years (13px) have different line-box heights; box centering would misalign */
        align-items: baseline;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 76%;
        pointer-events: auto;
      }
      #years::before {
        content: "";
        position: absolute;
        z-index: -1;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        /* Grows with content (an extra places row above when a year is selected); hugs the text —
           the old +90px box with a wide elliptical fade smeared the map far beyond the labels */
        width: calc(100% + 56px);
        height: calc(100% + 24px);
        background: transparent;
        -webkit-backdrop-filter: blur(9px);
        backdrop-filter: blur(9px);
        /* Soft-edged rectangle: two linear fades intersected (radial ellipse can't hug a long row) */
        -webkit-mask-image:
          linear-gradient(
            to right,
            transparent,
            #000 7%,
            #000 93%,
            transparent
          ),
          linear-gradient(transparent, #000 22%, #000 78%, transparent);
        -webkit-mask-composite: source-in;
        mask-image:
          linear-gradient(
            to right,
            transparent,
            #000 7%,
            #000 93%,
            transparent
          ),
          linear-gradient(transparent, #000 22%, #000 78%, transparent);
        mask-composite: intersect;
        pointer-events: none;
      }
      #years button {
        font-family: var(--fell);
        cursor: pointer;
        background: none;
        border: none;
        padding: 3px 7px;
        font:
          italic 13px "Cinzel",
          serif;
        color: var(--ink2);
        opacity: 0.55;
        transition:
          opacity 0.2s,
          color 0.2s;
        letter-spacing: 0.03em;
        text-shadow: 0 0 5px rgba(236, 227, 207, 0.95);

      #years button:hover {
        opacity: 0.85;
      }
      #years button.on {
        opacity: 1;
        color: #7a2a1e;
        font-weight: 600;
      }
      /* Paging arrows (‹ back to earlier years, › forward to later), auto-hide at the ends;
         larger and darker than year buttons (user feedback: 15px / 0.55 opacity was simply invisible) */
      #years button.pg {
        font-style: normal;
        font-size: 21px;
        line-height: 1;
        padding: 3px 8px;
        /* Measured glyphs: ‹ centers 7px above baseline, digits 5px → shift down 2px so visual midlines coincide */
        transform: translateY(2px);
        color: var(--ink);
        opacity: 0.8;
      }
      #years button.pg:hover {
        opacity: 1;
      }
      /* Collapsed state (default): the whole strip shows only a "Years ▾" toggle, expanding on click
         (user decision: don't lay them all out at first) */
      #years:not(.open) button:not(.tg) {

        opacity: 0.75;

      /* When a year is selected, list that year's visited places in a row above the strip (gold-fill granularity) */
      #yearlist {

        text-align: center;

        color: var(--ink2);

      /* Mobile: year strip widened to 2 rows (3 rows / 106px covered the map); buttons not shrunk, preserving tap size */
      @media (max-width: 700px) {
        #years {
          gap: 4px;

        /* Only the OPEN strip widens to 92%; collapsed keeps the base fit-content so the blur
           backdrop hugs the "Years ▾" toggle instead of smearing the scale bar at bottom-left */
        #years.open {
          width: 92%;
          max-width: 92%;
        }
        #years::before {
          width: calc(100% + 24px);
          height: calc(100% + 16px);
        }
        /* Story card: on narrow screens, switch from "fixed 300px right-aligned, ~62px left edge remaining" to a near-full-width bottom drawer (above the year strip, slides up).
           `body #card` raises specificity — this @media block precedes the base #card rules, so equal specificity would be overridden. */
        body #card {
          left: 12px;
          right: 12px;
          width: auto;
          top: 50%;
          bottom: auto;
          /* Centre it vertically like desktop so the ‹› (hung at the card's mid-height) sit at ONE fixed
             screen spot regardless of photo size — tap the same place to flip through every image. */
          transform: translateY(calc(-50% + 14px));
        }
        body #card.show {
          transform: translateY(-50%);
        }
        /* Phones: smaller photo (the desktop cap read too large / edge-to-edge) */
        body #card .photo.has-img img {
          max-width: 230px;
          max-height: 34vh;
        }
        /* Keep the flip arrows on-screen and at the card's fixed edges (desktop's -14px hangs them off
           the near-edge mobile card) */
        body #card .ph-prev {
          left: 2px;
        }
        body #card .ph-next {
          right: 2px;
        }
      }

      /* Mobile: shrink the title + wax seal so they stop overlapping the breadcrumb (desktop untouched) */
      @media (max-width: 640px) {

          left: 14px;
          top: 14px;
          width: 52px;
          height: 52px;

        #title {
          top: 12px;

        #title b {

        #title small {

        }
        .trule.bot .gl {

        }
        #crumbs {

        }

        #stamp {
          top: 88px;
          right: 12px;
          font-size: 10.5px;
        }
        /* left toolbar: pull up under the smaller seal and flush-left with it (tops/left were tuned to the 74px desktop seal at left:28) */
        #music {
          top: 78px;
          left: 18px;
        }
        #daynight {
          top: 116px;
          left: 18px;
        }
        #links {
          top: 156px;
          left: 18px;
        }
        /* Year picker: a vertical scroll wheel (scroll a year to the centre to pick it) — replaces the button strip */
        /* Wheel mode: the picker is a narrow centred column — hug it so the blur backdrop
           doesn't fog the compass and scale bar at the bottom corners */
        #years.open {
          width: -moz-fit-content;
          width: fit-content;
        }
        .yr-wheel {
          flex-basis: 100%;
          position: relative;
          display: flex;
          justify-content: center;
        }
        .yr-wheel-track {
          height: 220px;
          width: 130px;
          overflow-y: scroll;
          scroll-snap-type: y mandatory;
          scrollbar-width: none;
          text-align: center;
          padding: 88px 0; /* = (height - row)/2 so the first/last option can reach the centre */
          -webkit-mask: linear-gradient(
            transparent,
            #000 30%,
            #000 70%,
            transparent
          );
          mask: linear-gradient(transparent, #000 30%, #000 70%, transparent);
        }
        .yr-wheel-track::-webkit-scrollbar {
          display: none;

        .yr-opt {
          height: 44px;

        .yr-opt.sel {
          opacity: 1;
          color: #7a2a1e;
          font-weight: 600;
          font-size: 18px;

        .yr-wheel::before,
        .yr-wheel::after {
          content: "";
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
          width: 86px;
          height: 1px;
          background: linear-gradient(90deg, transparent, #b89344, transparent);
          pointer-events: none;
        }
        .yr-wheel::before {
          top: calc(50% - 22px);
        }
        .yr-wheel::after {
          top: calc(50% + 22px);

      #card .photo.has-img {

        height: auto;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;

      #card .photo.enter {
        height: 64px;
        padding: 0 16px;
        cursor: pointer;
        background: #ece3cf;

      #card .ph-prev,
      #card .ph-next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid var(--gold);
        background: rgba(236, 227, 207, 0.95);

        padding: 0 0 2px;
        box-shadow: 0 2px 6px rgba(30, 18, 4, 0.18);

      }

            paint: {
              "background-color": [
                "interpolate",
                ["linear"],
                ["zoom"],
                6,
                "#b9cdd0",
                7,
                "#ece3cf",
              ],
            },
          },
          {
            id: "roads",
            type: "line",
            source: "omt",
            "source-layer": "transportation",
            // Exclude ferry routes, otherwise the sea gets a web of crisscrossing lines
            filter: ["!=", ["get", "class"], "ferry"],
            layout: { "line-cap": "round", "line-join": "round" },
            paint: {
              // Road network is background texture, not the star: pale warm gray, must not overpower spot markers (user decision)
              "line-color": "#8f8069",
              "line-opacity": 0.7,
              "line-width": [
                "interpolate",
                ["exponential", 1.6],
                ["zoom"],
                11,
                [
                  "match",
                  ["get", "class"],
                  ["motorway", "trunk"],
                  0.6,
                  ["primary", "secondary"],
                  0.4,
                  0.25,
                ],
                14,
                [
                  "match",
                  ["get", "class"],
                  ["motorway", "trunk"],
                  1.1,
                  ["primary", "secondary"],
                  0.7,
                  0.42,
                ],
                16,
                [
                  "match",
                  ["get", "class"],
                  ["motorway", "trunk"],
                  1.6,
                  ["primary", "secondary"],
                  1.05,
                  0.6,
                ],
              ],
            },
          },
        ],
      };

      const map = new maplibregl.Map({
        container: "map",
        style,
        center: [6, 30],
        zoom: 1.5,
        minZoom: 0.6,
        maxZoom: 17,
        attributionControl: false,
        dragRotate: false,
        renderWorldCopies: true, // allow infinite horizontal scrolling (keep panning east/west forever)
      });
      window._map = map;

      // ===== Custom cursor =====
      const CLICKABLE_SEL =
        ".port .pin,.port.area .lbl,#seal,#years button,#crumbs .cr,#card .ph-prev,#card .ph-next,#card .photo.enter,#music,#links a";
      if (matchMedia("(pointer: fine)").matches) {
        document.documentElement.classList.add("ccursor");
        const cursorEl = document.getElementById("cursor");
        addEventListener(
          "mousemove",
          (e) => {
            cursorEl.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            cursorEl.classList.toggle(
              "hot",
              !!(e.target.closest && e.target.closest(CLICKABLE_SEL)),
            );
          },
          true,
        );
        addEventListener("mouseout", (e) => {
          if (!e.relatedTarget) cursorEl.style.opacity = "0";
        });
        addEventListener("mouseover", () => (cursorEl.style.opacity = ""));
      }

      // ===== Data + state machine =====
      let DATA = null,
        WORLD = null,
        STATES = null,
        WEBIMG = {};
      // NaturalEarth country name → footprints.json name: derived from ne_names in DATA (see data loading below),
      // no longer hardcoded. To add a country, just fill in its ne_names / iso_a3 in footprints.json.
      const NE2MINE = {};
      const stack = []; // [{level,c,r,ct}] level: world|country|region|city
      let yearFilter = null; // null = all, otherwise an integer year
      let navTs = 0; // timestamp of last level change (minimum-interval debounce)
      const markers = [],
        portEls = [];

      const card = document.getElementById("card");
      const hideCard = () => card.classList.remove("show");

      function clearMarkers() {
        markers.forEach((m) => m.remove());
        markers.length = 0;
        portEls.length = 0;
        if (map.getLayer("route")) map.removeLayer("route");
        if (map.getSource("route")) map.removeSource("route");
      }
      // Spot route lines: antique-chart dashed style. lines = multiple lines (one closed ring per region)
      function drawRoute(lines) {
        lines = (lines || []).filter((l) => l && l.length >= 2);
        if (!lines.length) return;
        map.addSource("route", {
          type: "geojson",
          data: {
            type: "Feature",
            geometry: { type: "MultiLineString", coordinates: lines },
          },
        });
        map.addLayer({
          id: "route",
          type: "line",
          source: "route",
          layout: { "line-cap": "round", "line-join": "round" },
          paint: {
            // Route dashes follow day/night: dark red vanishes on deep blue at night, use bright terracotta instead
            "line-color": (night ? THEMES.night : THEMES.day).route,
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              11, 1.0,
              13, 1.8,
              16, 2.8,
            ],
            // Raise opacity at night too: 50% dark red at far zoom is effectively invisible on dark ground
            "line-opacity": night
              ? 0.8
              : ["interpolate", ["linear"], ["zoom"], 11, 0.5, 13, 0.8, 16, 0.92],
            "line-dasharray": [3, 2.5],
          },
        });
      }

      const bbCenter = (b) => [(b[0] + b[2]) / 2, (b[1] + b[3]) / 2];
      // Label anchor for remote island states (data flag mark:true, e.g. Hawaii): use the
      // bbox center of the actual points. Not the state polygon's bbox — Hawaii's polygon
      // includes the NW island chain (out to -178°), drifting the label into empty ocean far west of the main islands
      function markBBox(c, r) {
        const pts = (r.cities || []).map((q) => [q.lng, q.lat]);
        if (!pts.length) return stateBBox(c.name, r.name);
        let x0 = 1e9,
          y0 = 1e9,
          x1 = -1e9,
          y1 = -1e9;
        pts.forEach(([x, y]) => {
          if (x < x0) x0 = x;
          if (x > x1) x1 = x;
          if (y < y0) y0 = y;
          if (y > y1) y1 = y;
        });
        return [x0, y0, x1, y1];
      }

      // Ring coordinates for a set of cities: year filter + visibility filter + ring ordering + closing
      function ringCoords(c, r, cities) {
        const pts = ringOrder(
          cities.filter(
            (x) =>
              (yearFilter === null ||
                (x.years || []).some((y) => +y === yearFilter)) &&
              cityVisible(c, r, x),
          ),
          (q) => [q.lng, q.lat],
        ).map((q) => [q.lng, q.lat]);
        if (pts.length >= 3) pts.push(pts[0]);
        return pts;
      }
      // Draw routes per current level + year filter: connect only points actually shown, closed into rings.
      // Region level draws one ring per region nationwide (neighbor regions' points show, so should their lines); no lines at world level
      function redrawRoute() {
        if (map.getLayer("route")) map.removeLayer("route");
        if (map.getSource("route")) map.removeSource("route");
        const e = stack[stack.length - 1];
        if (!e) return;
        let lines = [];
        if (e.level === "region") {
          lines = e.c.regions.map((r2) => ringCoords(e.c, r2, r2.cities));
        } else if (e.level === "country") {
          // One ring per flat country (neighbor countries' points show, so should their lines); region-split countries only get rings at region level
          lines = DATA.countries
            .filter((c2) => c2.split !== "region")
            .map((c2) => ringCoords(c2, c2.regions[0], flatCities(c2)));
        } else if (e.level === "city") {
          const pts = levelSeq().map((ct) => [ct.lng, ct.lat]);
          if (pts.length >= 3) pts.push(pts[0]);
          lines = [pts];
        }
        drawRoute(lines);
      }

      // Ring ordering: sort by angle around the centroid so the path forms one outer loop (a tour ring),
      // not zigzagging in data/nearest order. key extracts coords; items may be coord arrays or city objects
      function ringOrder(items, key = (p) => p) {
        if (items.length < 3) return items;
        let cx = 0,
          cy = 0;
        items.forEach((q) => {
          const c = key(q);
          cx += c[0];
          cy += c[1];
        });
        cx /= items.length;
        cy /= items.length;
        const ang = (q) => {
          const c = key(q);
          return Math.atan2(c[1] - cy, c[0] - cx);
        };
        return items.slice().sort((a, b) => ang(a) - ang(b));
      }

      // Route order of the current level's visible points (dashed lines and card ‹› cross-spot jumps share one order)
      function levelSeq() {
        const e = stack[stack.length - 1];
        if (!e) return [];
        const vis = (l) =>
          l.filter(
            (x) =>
              yearFilter === null ||
              (x.years || []).some((y) => +y === yearFilter),
          );
        if (e.level === "region")
          return ringOrder(
            vis(e.r.cities).filter((ct) => cityVisible(e.c, e.r, ct)),
            (c) => [c.lng, c.lat],
          );
        if (e.level === "country" && e.c.split !== "region")
          return ringOrder(
            vis(flatCities(e.c)).filter((ct) =>
              cityVisible(e.c, e.c.regions[0], ct),
            ),
            (c) => [c.lng, c.lat],
          );
        if (e.level === "city") {
          // City level: web attractions + photo spots with images; card ‹› rolls over to the next place
          const k = cityKids(e.c, e.r, e.ct);
          return ringOrder(vis([...k.webs, ...k.imgSpots]), (c) => [
            c.lng,
            c.lat,
          ]);
        }
        return [];
      }

      // Count of image-backed children (shared by city drill-down and container checks)
      function cityPlaces(c, r, ct) {
        const k = cityKids(c, r, ct);
        return k.imgSpots.length + k.webs.length;
      }
      // Whether a point goes on the map: drillable (≥2 image-backed children) or can show an image itself (own name / borrowed).
      // Points that can't show an image (e.g. pass-through cities without one) are hidden (user decision: only photo-backed places count)
      function cityVisible(c, r, ct) {
        return cityPlaces(c, r, ct) >= 2 || webImgs(ct).length > 0;
      }
      // Image-backed child count of this point in the current level's context (0 outside region/country levels)
      function containerPlaces(x) {
        const e = stack[stack.length - 1];
        if (!e || !e.c || e.level === "city") return 0;
        const r = e.level === "region" ? e.r : e.c.regions[0];
        return cityPlaces(e.c, r, x);
      }
      // "Container" city (drillable, e.g. Toronto/San Francisco): card image slot shows a "click to enter" panel
      function isContainer(x) {
        return containerPlaces(x) >= 2;
      }

      // Place a clickable node on the map (shared by country/region/city/spot)
      function addNode(lng, lat, label, sub, years, kind, onClick) {
        const el = document.createElement("div");
        // minor = small variant of area (world-level remote island labels, e.g. Hawaii)
        const area = kind === "area" || kind === "minor";
        el.className =
          "port" +
          (area ? " area" : "") +
          (kind === "minor" ? " minor" : "") +
          (kind === "web" ? " web" : "");
        // Areas (country/state) get no dot, text only; cities/spots keep the pin.
        // City/spot sub (photo count · place count) shows as a small note under the name; area sub still goes into aria only
        el.innerHTML =
          (area ? "" : `<span class="pin"></span>`) +
          `<span class="lbl">${label}${
            !area && sub ? `<small>${sub}</small>` : ""
          }</span>`;
        el.__years = years || [];
        const target = el.querySelector(area ? ".lbl" : ".pin");
        if (onClick && target) {
          target.addEventListener("click", (ev) => {
            ev.stopPropagation();
            onClick();
          });
          // Keyboard access: node is Tab-focusable like a button; Enter/Space drills into the next level
          target.tabIndex = 0;
          target.setAttribute("role", "button");
          target.setAttribute("aria-label", sub ? `${label} — ${sub}` : label);
          target.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter" || ev.key === " ") {
              ev.preventDefault();
              ev.stopPropagation();
              onClick();
            }
          });
        }
        markers.push(
          new maplibregl.Marker({ element: el })
            .setLngLat([lng, lat])
            .addTo(map),
        );
        portEls.push(el);
        return el;
      }

      // View fitting: fitBounds for a set of coords; flyTo for a single point
      function fitTo(coords, opts = {}) {
        if (!coords.length) return;
        if (coords.length === 1) {
          map.flyTo({
            center: coords[0],
            zoom: opts.zoom || 11,
            duration: opts.dur ?? 1000,
          });
        } else {
          const b = new maplibregl.LngLatBounds();
          coords.forEach((c) => b.extend(c));
          map.fitBounds(b, {
            padding: opts.padding || {
              top: 150,
              bottom: 130,
              left: 120,
              right: 130,
            },
            duration: opts.dur ?? 1000,
            maxZoom: opts.maxZoom || 14,
          });
        }
      }
      const centroid = (cities) => [
        cities.reduce((s, c) => s + c.lng, 0) / cities.length,
        cities.reduce((s, c) => s + c.lat, 0) / cities.length,
      ];
      const flatCities = (c) => c.regions.flatMap((r) => r.cities);
      // State/province bbox (computed from state polygon data); its center places the state label
      function stateBBox(mine, region) {
        if (!STATES) return null;
        const f = STATES.features.find(
          (x) =>
            x.properties.country === mine && x.properties.region === region,
        );
        if (!f) return null;
        let x0 = 1e9,
          y0 = 1e9,
          x1 = -1e9,
          y1 = -1e9;
        const scan = (c) => {
          if (typeof c[0] === "number") {
            if (c[0] < x0) x0 = c[0];
            if (c[0] > x1) x1 = c[0];
            if (c[1] < y0) y0 = c[1];
            if (c[1] > y1) y1 = c[1];
          } else c.forEach(scan);
        };
        scan(f.geometry.coordinates);
        return [x0, y0, x1, y1];
      }
      // Geometric center of a state, so its label sits at the state's center rather than the visited cities' centroid
      function stateCenter(mine, region) {
        const b = stateBBox(mine, region);
        return b && [(b[0] + b[2]) / 2, (b[1] + b[3]) / 2];
      }
      // Whole-country bounds (from its outline in world geojson), for "click a country → show the whole country first".
      // "Mainland" bounds: take the largest polygon and ignore detached pieces like Alaska,
      // so clicking a country zooms the mainland to fill the screen instead of shrinking to fit far-flung parts
      function countryBBox(mineName) {
        if (!WORLD) return null;
        const ne = Object.keys(NE2MINE).find((k) => NE2MINE[k] === mineName);
        const f = WORLD.features.find((x) => x.properties.NAME === ne);
        if (!f) return null;
        const g = f.geometry;
        const polys =
          g.type === "MultiPolygon" ? g.coordinates : [g.coordinates];
        let best = null,
          bestA = -1;
        for (const poly of polys) {
          let x0 = 1e9,
            y0 = 1e9,
            x1 = -1e9,
            y1 = -1e9;
          for (const p of poly[0]) {
            if (p[0] < x0) x0 = p[0];
            if (p[0] > x1) x1 = p[0];
            if (p[1] < y0) y0 = p[1];
            if (p[1] > y1) y1 = p[1];
          }
          const a = (x1 - x0) * (y1 - y0);
          if (a > bestA) {
            bestA = a;
            best = [
              [x0, y0],
              [x1, y1],
            ];
          }
        }
        return best ? new maplibregl.LngLatBounds(best[0], best[1]) : null;
      }
      // Which state of the country a point falls in (states.geojson polygons, ray casting, outer ring only):
      // remote states (e.g. Hawaii) lie outside the standard country view; world-level direct clicks use this to locate the state
      function regionAt(c, ll) {
        if (!STATES) return null;
        const inRing = (ring) => {
          let hit = false;
          for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
            const [xi, yi] = ring[i],
              [xj, yj] = ring[j];
            if (
              yi > ll.lat !== yj > ll.lat &&
              ll.lng < ((xj - xi) * (ll.lat - yi)) / (yj - yi) + xi
            )
              hit = !hit;
          }
          return hit;
        };
        const f = STATES.features.find(
          (x) =>
            x.properties.country === c.name &&
            (x.geometry.type === "MultiPolygon"
              ? x.geometry.coordinates
              : [x.geometry.coordinates]
            ).some((poly) => inRing(poly[0])),
        );
        return f ? c.regions.find((r) => r.name === f.properties.region) : null;
      }

      // Bounding box of a set of cities
      function boundsOf(cities) {
        const b = new maplibregl.LngLatBounds();
        cities.forEach((c) => b.extend([c.lng, c.lat]));
        // Guard against zero size: a single city/point makes screen coverage = 0 → judged "too small" and popped right after entering.
        // Provide a minimum geographic extent as a fallback.
        if (
          b.getEast() - b.getWest() < 0.3 ||
          b.getNorth() - b.getSouth() < 0.25
        ) {
          const c = b.getCenter();
          b.extend([c.lng - 0.25, c.lat - 0.2]);
          b.extend([c.lng + 0.25, c.lat + 0.2]);
        }
        return b;
      }
      // Whether two boxes intersect (don't pop the level while the area is still in view)
      function boundsIntersect(a, b) {
        if (!a || !b) return true;
        return !(
          a.getEast() < b.getWest() ||
          a.getWest() > b.getEast() ||
          a.getNorth() < b.getSouth() ||
          a.getSouth() > b.getNorth()
        );
      }
      function lyr(id, vis, filt) {
        if (!map.getLayer(id)) return;
        map.setLayoutProperty(id, "visibility", vis ? "visible" : "none");
        if (vis && filt) map.setFilter(id, filt);
      }
      // Central control per current level: world fill / country outlines / state highlight
      function applyHighlight(e) {
        const mine = e.c?.name;
        const world = e.level === "world";
        // Year strip has a year selected: gold only on shapes visited that year (via the __ys year array on features)
        const yc =
          yearFilter === null ? null : ["in", yearFilter, ["get", "__ys"]];
        // Visited-country fill: world level only (border-line global borders always show, not controlled here)
        const cf = ["==", ["get", "__v"], 1];
        lyr("country-fill", world, yc ? ["all", cf, yc] : cf);
        // Visited state/province fill highlight: (region-split) country level + region level
        const showState =
          (e.level === "country" && e.c.split === "region") ||
          e.level === "region";
        const sf = ["==", ["get", "country"], mine || "__x__"];
        lyr("state-fill", showState, yc ? ["all", sf, yc] : sf);
        // Border darkness follows level (user decision): faint at world overview (else the whole map is dark lines),
        // deepened only inside "concrete maps where spots are visible" (flat country / region / city levels)
        const deep =
          e.level === "region" ||
          e.level === "city" ||
          (e.level === "country" && e.c.split !== "region");
        const B = (id, p, v) =>
          map.getLayer(id) && map.setPaintProperty(id, p, v);
        B("border-line", "line-opacity", deep ? 0.85 : 0.33);
        ["state-border-far", "state-border"].forEach((id) => {
          B(id, "line-width", deep ? 1.1 : 0.7);
          B(id, "line-opacity", deep ? 0.85 : 0.4);
        });
      }

      // ===== Per-level rendering (does not mutate stack) =====
      function renderTop(fly = true, noFit = false) {
        const e = stack[stack.length - 1];
        navTs = Date.now();
        // Record this level's bounds: auto-pop when the view fully leaves them (panned away)
        e._bbox =
          e.level === "world"
            ? null
            : e.level === "country"
              ? e.c.split === "region"
                ? countryBBox(e.c.name) || boundsOf(flatCities(e.c))
                : null // flat country level: neighbor countries' points also show (e.g. Europe); panning out doesn't pop (zooming out still does)
              : e.level === "region"
                ? // region level's pan range widened to the whole country: neighbor regions' points show too; panning there must not insta-pop
                  countryBBox(e.c.name) || boundsOf(e.r.cities)
                : (() => {
                    // City-level bounds: image-backed photo spots + nested web attractions in one bbox;
                    // with just one point, use the city point ± buffer (avoid zero size)
                    const k = cityKids(e.c, e.r, e.ct);
                    const pts = [...k.imgSpots, ...k.webs];
                    if (pts.length > 1)
                      return boundsOf(
                        pts.map((s) => ({ lng: s.lng, lat: s.lat })),
                      );
                    const b = new maplibregl.LngLatBounds();
                    b.extend([e.ct.lng - 0.12, e.ct.lat - 0.1]);
                    b.extend([e.ct.lng + 0.12, e.ct.lat + 0.1]);
                    return b;
                  })();
        clearMarkers();
        hideCard();
        const small = document.querySelector("#title small");
        if (e.level === "world") {
          applyHighlight(e);
          small.textContent = "THE WORLD";
          DATA.countries.forEach((c) => {
            addNode(
              c.center[0],
              c.center[1],
              c.name,
              `${c.cityCount} cities`,
              c.years,
              "area",
              () => navigate({ level: "country", c }),
            );
          });
          // Remote small islands (e.g. Hawaii) are too tiny to see at world level, as if missing:
          // add a small name label. Clicking it enters the state while keeping the country in the stack
          // (The World › United States › Hawaii), same as clicking the islands directly
          DATA.countries.forEach((c) =>
            (c.regions || [])
              .filter((r) => r.mark)
              .forEach((r) => {
                const b = markBBox(c, r);
                const ctr = b ? bbCenter(b) : centroid(r.cities);
                addNode(
                  ctr[0],
                  ctr[1],
                  r.name,
                  `${r.cities.length} cities`,
                  r.years,
                  "minor",
                  () => {
                    stack.push({ level: "country", c });
                    navigate({ level: "region", c, r });
                  },
                );
              }),
          );
          if (!noFit)
            fitTo(
              DATA.countries.map((c) => c.center),
              {
                padding: { top: 150, bottom: 140, left: 80, right: 80 },
                maxZoom: 4.5,
                dur: fly ? 650 : 0,
              },
            );
        } else if (e.level === "country") {
          applyHighlight(e);
          small.textContent = e.c.name.toUpperCase();
          if (e.c.split === "region") {
            e.c.regions.forEach((r) => {
              // Marked states (e.g. Hawaii) get their label at the points' bbox center; others at the state polygon's geometric center
              const rb = r.mark && markBBox(e.c, r);
              const ctr = rb
                ? bbCenter(rb)
                : stateCenter(e.c.name, r.name) || centroid(r.cities);
              addNode(
                ctr[0],
                ctr[1],
                r.name,
                `${r.cities.length} cities`,
                r.years,
                "area",
                () => navigate({ level: "region", c: e.c, r }),
              );
            });
          }
          // Place all flat countries' points together (points stay clickable when panning to a neighbor, e.g. across Europe;
          // image-less points still stay off the map). A region-split country's own state labels are placed in the if above
          DATA.countries
            .filter((c2) => c2.split !== "region")
            .forEach((c2) =>
              flatCities(c2)
                .filter((ct) => cityVisible(c2, c2.regions[0], ct))
                .forEach((ct) => addCityNode(c2, c2.regions[0], ct)),
            );
          // Show the whole country (mainland filling the view); basemap provides state borders, visited states highlighted gold
          if (!noFit) {
            const bb = countryBBox(e.c.name);
            // Remote states (e.g. Hawaii) fall outside the mainland box: extend the fit with all state label anchors,
            // otherwise entering the US never shows the Hawaii label, effectively hiding it
            if (bb && e.c.split === "region")
              e.c.regions.forEach((r) => {
                // Marked states' (e.g. Hawaii) merged anchor shares the state label's source (points' bbox center)
                const rb = r.mark && markBBox(e.c, r);
                const ctr = rb
                  ? bbCenter(rb)
                  : stateCenter(e.c.name, r.name) || centroid(r.cities);
                if (ctr) bb.extend(ctr);
              });
            if (bb)
              map.fitBounds(bb, {
                padding: { top: 96, bottom: 84, left: 40, right: 40 },
                maxZoom: 6.5,
                duration: fly ? 650 : 0,
              });
            else
              fitTo(
                flatCities(e.c)
                  .filter((ct) => cityVisible(e.c, e.c.regions[0], ct))
                  .map((ct) => [ct.lng, ct.lat]),
                { dur: fly ? 650 : 0 },
              );
          }
        } else if (e.level === "region") {
          applyHighlight(e);
          small.textContent = e.r.name.toUpperCase();
          // Place all regions' points nationwide (points stay clickable when panning to a neighbor's gold area; image-less points still hidden);
          // the view fits only the current region, and route rings / ‹› playthrough stay within it too
          e.c.regions.forEach((r2) =>
            r2.cities
              .filter((ct) => cityVisible(e.c, r2, ct))
              .forEach((ct) => addCityNode(e.c, r2, ct)),
          );
          if (!noFit)
            fitTo(
              e.r.cities
                .filter((ct) => cityVisible(e.c, e.r, ct))
                .map((ct) => [ct.lng, ct.lat]),
              { dur: fly ? 650 : 0 },
            );
        } else if (e.level === "city") {
          applyHighlight(e);
          small.textContent = e.ct.name.toUpperCase();
          // Expand only with multiple image-backed children; image-less minor places stay off the map (user decision: only photo-backed places count)
          const k = cityKids(e.c, e.r, e.ct);
          if (k.imgSpots.length + k.webs.length >= 2) {
            // Image-backed photo spots: city card with playthrough (3 same-name web images, then rolls to the next place); label shows the name only
            k.imgSpots.forEach((s) =>
              addNode(
                s.lng,
                s.lat,
                s.name,
                "",
                s.years,
                "spot",
                () => showCityCard(s),
              ),
            );
            // Web attractions: name is self-explanatory, no small note (photo spots carry the N photos note, already distinct)
            k.webs.forEach((w) =>
              addNode(w.lng, w.lat, w.name, "", w.years, "web", () =>
                showCityCard(w),
              ),
            );
            if (!noFit)
              fitTo(
                [...k.imgSpots, ...k.webs].map((s) => [s.lng, s.lat]),
                { zoom: 13, dur: fly ? 650 : 0 },
              );
          } else {
            // Pass-through point / photo-less city: fly to it and open the city card directly (not relying on moveend)
            if (!noFit)
              map.flyTo({
                center: [e.ct.lng, e.ct.lat],
                zoom: e.ct.source === "web" ? 10 : 12,
                duration: fly ? 650 : 0,
              });
            showCityCard(e.ct);
          }
        }
        renderCrumbs();
        applyYearFilter();
        redrawRoute();
        document
          .querySelectorAll("#years button")
          .forEach((b) =>
            b.classList.toggle(
              "on",
              String(yearFilter) === b.dataset.y ||
                (yearFilter === null && b.dataset.y === "all"),
            ),
          );
        map.once("idle", () => {
          updateScale();
          declutter();
          if (!noFit) stack[stack.length - 1]._z = map.getZoom();
          navTs = Date.now();
          const top = stack[stack.length - 1];
          // World level: forbid zooming out below the standard world view (else the map shrinks to a patch amid blank space)
          if (top.level === "world" && top._z)
            map.setMinZoom(Math.max(0.6, top._z - 0.2));
          else map.setMinZoom(0.6);
        });
      }

      function addCityNode(c, r, ct) {
        const kind = ct.source === "web" ? "web" : "spot";
        // Cities drill down only with multiple image-backed children (incl. nested web attractions, e.g. Vancouver);
        // single points (spot / pass-through) pop the card in place, surrounding pins stay clickable.
        // Drillable points read "N places ›" (› hints they can be entered); single points show the name only;
        // state text labels carry no count (fill already marks them visited) — they take the area branch, naturally note-less
        const places = cityPlaces(c, r, ct);
        addNode(
          ct.lng,
          ct.lat,
          ct.name,
          places >= 2 ? places + " places" : "",
          ct.years,
          kind,
          places >= 2
            ? () => {
                // Clicked from another region/country: first swap the current level to the point's home so breadcrumbs/back line up
                const top = stack[stack.length - 1];
                if (top.level === "region" && top.r !== r)
                  stack[stack.length - 1] = { level: "region", c, r };
                else if (top.level === "country" && top.c !== c)
                  stack[stack.length - 1] = { level: "country", c };
                navigate({ level: "city", c, r, ct });
              }
            : () => showCityCard(ct),
        );
      }

      function navigate(entry) {
        stack.push(entry);
        history.pushState({ d: stack.length }, "");
        renderTop(true);
      }
      function goBack() {
        if (stack.length <= 1) return;
        stack.pop();
        renderTop(true);
      }
      // Breadcrumb jump back to level i
      function jumpTo(i) {
        if (i < stack.length - 1) stack.length = i + 1;
        renderTop(true); // re-fit even when clicking the current level (e.g. world), returning to its standard view
      }

      function renderCrumbs() {
        const wrap = document.getElementById("crumbs");
        const labels = stack.map((e) =>
          e.level === "world"
            ? "The World"
            : e.level === "country"
              ? e.c.name
              : e.level === "region"
                ? e.r.name
                : e.ct.name,
        );
        let html = "";
        labels.forEach((lb, i) => {
          if (i) html += `<span class="sep">›</span>`;
          // The World item (i=0) is always clickable (returns to the initial world view); others only when not the current level
          html +=
            i === labels.length - 1 && i !== 0
              ? `<span class="cur">${lb}</span>`
              : `<span class="cr" data-i="${i}" tabindex="0" role="button" aria-label="Go to ${lb}">${lb}</span>`;
        });
        wrap.innerHTML = html;
        wrap.querySelectorAll(".cr").forEach((s) => {
          const go = () => jumpTo(+s.dataset.i);
          s.addEventListener("click", go);
          s.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter" || ev.key === " ") {
              ev.preventDefault();
              go();
            }
          });
        });
      }

      // ===== Dense-point cleanup =====
      // Approximate spherical distance (km): all radius checks are city-scale, planar approximation suffices
      const kmDist = (a, b) => {
        const dy = (a.lat - b.lat) * 111;
        const dx =
          (a.lng - b.lng) *
          111 *
          Math.cos((((a.lat + b.lat) / 2) * Math.PI) / 180);
        return Math.hypot(dx, dy);
      };
      const NEST_KM = 25; // web attractions within this distance of a city anchor nest into that city (no point pile-up at region level)
      const MERGE_KM = 0.8; // merge radius for city-level photo micro-places (reverse-geocoded street names are too fragmented)
      // Region-level nesting: fold web-imaged attractions into the nearest city anchor (a city with photos, or an
      // image-less city cluster point like Vancouver/Banff). Downtown Toronto's pile of spots now hangs under Toronto.
      function nestAttractions() {
        DATA.countries.forEach((c) => {
          c.regions.forEach((r) => {
            const rName = r && r.name ? r.name : "";
            const key = (x) => `${c.name}|${rName}|${x.name}`;
            // Anchors exclude pass-through points (<5 photos, e.g. Eggertsville): otherwise major attractions
            // would nest into nameless specks and vanish at region level
            const anchors = r.cities.filter((ct) =>
              ct.source === "photo" ? ct.count >= 5 : !WEBIMG[key(ct)],
            );
            const webs = r.cities.filter(
              (ct) => ct.source === "web" && WEBIMG[key(ct)],
            );
            webs.forEach((s) => {
              let best = null,
                bd = NEST_KM;
              anchors.forEach((a) => {
                const d = kmDist(a, s);
                if (d < bd) {
                  bd = d;
                  best = a;
                }
              });
              if (best) {
                (best.webSpots = best.webSpots || []).push(s);
                r.cities.splice(r.cities.indexOf(s), 1);
              }
            });
          });
        });
      }
      // City-level children (cached): photo micro-places merged within MERGE_KM (counts summed, years unioned,
      // biggest keeps the name); nested web attractions sharing a photo place's name (e.g. Distillery District) are deduped,
      // and the spot card picks up images automatically via the shared name key
      function cityKids(c, r, ct) {
        if (!ct._kids) {
          const named = (ct.spots || []).filter((s) => s.spot && s.spot.trim());
          const merged = [];
          named
            .slice()
            .sort((a, b) => b.count - a.count)
            .forEach((s) => {
              const hit = merged.find((o) => kmDist(o, s) < MERGE_KM);
              if (hit) {
                hit.count += s.count;
                hit.years = [
                  ...new Set([...(hit.years || []), ...(s.years || [])]),
                ].sort();
              } else merged.push({ ...s });
            });
          const webs = (ct.webSpots || []).filter(
            (w) =>
              !merged.some(
                (s) => s.spot.toLowerCase() === w.name.toLowerCase(),
              ),
          );
          // Wrap image-backed photo places as nodes isomorphic to web attractions (reuse the same object; cross-point
          // playthrough relies on object identity in levelSeq); clicking opens the city card, then rolls to the next place
          const K = (n) => `${c.name}|${r && r.name ? r.name : ""}|${n}`;
          const imgSpots = merged
            .filter((s) => WEBIMG[K(s.spot)])
            .map((s) => ({
              name: s.spot,
              lat: s.lat,
              lng: s.lng,
              years: s.years,
              count: s.count,
              source: "photo",
              _spot: s,
            }));
          ct._kids = { spots: merged, webs, imgSpots };
        }
        return ct._kids;
      }

      // ===== Story card (cities and spots share showCityCard) =====
      // Web images for the current place (data/webimages.json, key = country|region|name; flat countries use an empty region).
      // A city cluster point (e.g. Vancouver) with no images of its own borrows the first nested attraction's;
      // failing that, one of its own image-backed photo spots (e.g. Sundbyerne borrows Christianshavn)
      function webImgs(ct) {
        // Prefer the point's own country/region (the current level's context mismatches in cross-region display); fall back to the current level
        const e = stack[stack.length - 1];
        const cn = ct._c || (e && e.c ? e.c.name : "");
        const rn =
          ct._r !== undefined ? ct._r : e && e.r && e.r.name ? e.r.name : "";
        const k = (n) => `${cn}|${rn}|${n}`;
        const own = WEBIMG[k(ct.name)];
        if (own) return own;
        const w = (ct.webSpots || []).find((s) => WEBIMG[k(s.name)]);
        if (w) return WEBIMG[k(w.name)];
        const sp = (ct.spots || []).find((s) => s.spot && WEBIMG[k(s.spot)]);
        return sp ? WEBIMG[k(sp.spot)] : [];
      }
      function showCityCard(ct, imgIdx = 0) {
        const cont = isContainer(ct);
        const imgs = cont ? [] : webImgs(ct);
        let idx = imgs.length
          ? Math.min(Math.max(imgIdx, 0), imgs.length - 1)
          : 0;
        // Card keeps only: name + coords · years + images (3, switchable);
        // container cities (e.g. San Francisco) show a "click to enter" panel instead of borrowed images (user decision)
        const photoBox = cont
          ? `<div class="photo enter" role="button" tabindex="0" aria-label="Enter ${ct.name}">` +
            `<span>${containerPlaces(ct)} places — click to enter ›</span></div>`
          : imgs.length
            ? `<div class="photo has-img"><img src="${imgs[idx]}" alt="${ct.name}" decoding="async">` +
              (imgs.length > 1
                ? `<span class="ph-dots">${imgs.map((_, i) => `<i${i === idx ? ' class="on"' : ""}></i>`).join("")}</span>`
                : "") +
              `</div>`
            : "";
        // ‹› hung at the midline of the card's edges (card is vertically centered; position ignores image size, allowing rapid click-through)
        const navBtns =
          cont || imgs.length > 1
            ? `<button class="ph-prev" aria-label="Previous">‹</button>` +
              `<button class="ph-next" aria-label="Next">›</button>`
            : "";
        card.innerHTML =
          `<h3>${ct.name}</h3><div class="coord">${ct.lat.toFixed(3)}°${ct.lat >= 0 ? "N" : "S"} · ${Math.abs(ct.lng).toFixed(3)}°${ct.lng >= 0 ? "E" : "W"} · ${(ct.years || []).join("/") || "—"}</div>` +
          photoBox +
          navBtns;
        // ‹› playthrough: at the last image / on a container card, follow the ring to the prev/next point (imaged spots and containers both count as stops)
        const jump = (d) => {
          const seq = levelSeq().filter(
            (x) => webImgs(x).length || isContainer(x),
          );
          const pos = seq.indexOf(ct);
          if (pos < 0 || seq.length < 2) return false;
          const nxt = seq[(pos + d + seq.length) % seq.length];
          map.easeTo({ center: [nxt.lng, nxt.lat], duration: 650 });
          showCityCard(nxt, d > 0 ? 0 : Math.max(webImgs(nxt).length - 1, 0));
          return true;
        };
        if (cont) {
          const box = card.querySelector(".photo.enter");
          const enter = () => {
            const e = stack[stack.length - 1];
            const r = e.level === "region" ? e.r : e.c.regions[0];
            navigate({ level: "city", c: e.c, r, ct });
          };
          box.addEventListener("click", enter);
          box.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter" || ev.key === " ") {
              ev.preventDefault();
              enter();
            }
          });
          card
            .querySelector(".ph-prev")
            .addEventListener("click", () => jump(-1));
          card
            .querySelector(".ph-next")
            .addEventListener("click", () => jump(1));
        } else if (imgs.length) {
          const imgEl = card.querySelector(".photo img");
          // On image load failure (e.g. images missing in a new environment), collapse the whole block; no broken image/placeholder
          imgEl.addEventListener("error", () => {
            card.querySelector(".photo")?.remove();
          });
          if (imgs.length > 1) {
            const dots = [...card.querySelectorAll(".ph-dots i")];
            const go = (d) => {
              const ni = idx + d;
              if (ni < 0 || ni >= imgs.length) {
                if (jump(d)) return;
                idx = (ni + imgs.length) % imgs.length; // nowhere else on this level: wrap around
              } else idx = ni;
              imgEl.src = imgs[idx];
              dots.forEach((el, i) => el.classList.toggle("on", i === idx));
            };
            card
              .querySelector(".ph-prev")
              .addEventListener("click", () => go(-1));
            card
              .querySelector(".ph-next")
              .addEventListener("click", () => go(1));
            // Preload the other two so switching doesn't flash
            imgs.slice(1).forEach((s) => {
              new Image().src = s;
            });
          }
        }
        card.classList.add("show");
      }

      // ===== Year strip =====
      // Starting at 1999 is the user's chosen life span (photo data only reaches back to 2014; earlier years
      // backfilled from the user's own account); all 28 years take three rows and cover the map, so show 10 at a time (default 2017–2026),
      // ‹ pages back, › pages forward, arrows vanish at the ends
      const YR_LO = 1999;
      const YR_SPAN = 10; // cap: at most 10 year buttons per page; fewer when the strip is too narrow to fit them
      let yrPage = 0; // 0 = most recent page; each +1 steps back one page of years
      let yrOpen = false; // collapsed by default, only the "Years ▾" toggle shows
      const YR_MOBILE = 640; // at/below this width the strip becomes a drag slider instead of buttons
      // How many year buttons fit the desktop strip (#years is at most 76% of the viewport wide); never more than YR_SPAN.
      function yearSpan() {
        const perYear = 46,
          reserved = 150; // ~46px per year incl gap; ~150px reserved for toggle + All + the two arrows
        return Math.max(
          4,
          Math.min(
            YR_SPAN,
            Math.floor((window.innerWidth * 0.76 - reserved) / perYear),
          ),
        );
      }
      function buildYears(spanOverride) {
        const range = DATA.yearsRange || [2014, 2026];
        const lo = range[0],
          hi = range[1];
        const span = spanOverride != null ? spanOverride : yearSpan();
        const mobile = window.innerWidth <= YR_MOBILE;
        const maxPage = Math.ceil((hi - YR_LO + 1) / span) - 1;
        if (yrPage > maxPage) yrPage = maxPage;
        const wrap = document.getElementById("years");
        wrap.innerHTML = "";
        wrap.classList.toggle("open", yrOpen);
        wrap.appendChild(document.createElement("div")).id = "yearlist";
        // Toggle: when collapsed only it remains (showing the selected year); click to reveal the whole strip
        const tg = document.createElement("button");
        tg.className = "tg";
        tg.textContent =
          (yearFilter === null ? "Years" : yearFilter) +
          (yrOpen ? " ▴" : " ▾");
        tg.setAttribute("aria-label", yrOpen ? "Hide years" : "Filter by year");
        tg.addEventListener("click", () => {
          yrOpen = !yrOpen;
          buildYears();
        });
        wrap.appendChild(tg);

        // Mobile: one drag slider (All · lo … hi) instead of a cramped, hard-to-tap button strip
        if (mobile) {
          if (yrOpen) {
            // Vertical scroll wheel (All · lo … hi): scroll a year to the centre to select it
            const wheel = document.createElement("div");
            wheel.className = "yr-wheel";
            const track = document.createElement("div");
            track.className = "yr-wheel-track";
            const vals = ["all"];
            for (let y = lo; y <= hi; y++) vals.push(y);
            vals.forEach((v) => {
              const o = document.createElement("div");
              o.className = "yr-opt";
              o.dataset.y = v;
              o.textContent = v === "all" ? "All" : v;
              track.appendChild(o);
            });
            wheel.appendChild(track);
            wrap.appendChild(wheel);

            const ROW = 44; // must match .yr-opt height in CSS
            const idxOf = (yf) => (yf === null ? 0 : yf - lo + 1);
            const opts = [...track.querySelectorAll(".yr-opt")];
            // Mark the option nearest the centre; when `apply`, filter the map to it (no rebuild → keeps the scroll)
            const pick = (apply) => {
              const box = track.getBoundingClientRect();
              const cy = box.top + box.height / 2;
              let best = null,
                bestD = Infinity;
              opts.forEach((o) => {
                const r = o.getBoundingClientRect();
                const d = Math.abs(r.top + r.height / 2 - cy);
                if (d < bestD) {
                  bestD = d;
                  best = o;
                }
              });
              opts.forEach((o) => o.classList.toggle("sel", o === best));
              const y = best.dataset.y === "all" ? null : +best.dataset.y;
              if (apply && y !== yearFilter) {
                yearFilter = y;
                tg.textContent = (y === null ? "Years" : y) + " ▴";
                applyYearFilter();
                applyHighlight(stack[stack.length - 1]);
                redrawRoute();
                declutter();
                renderYearList();
              }
            };
            track.scrollTop = idxOf(yearFilter) * ROW; // centre the current selection
            pick(false);
            let st;
            track.addEventListener("scroll", () => {
              pick(false); // live highlight while scrolling
              clearTimeout(st);
              st = setTimeout(() => pick(true), 120); // apply once the scroll settles
            });
            // tap a year to snap it to the centre
            opts.forEach((o, i) =>
              o.addEventListener("click", () =>
                track.scrollTo({ top: i * ROW, behavior: "smooth" }),
              ),
            );
          }
          renderYearList();
          return;
        }

        const mk = (label, val) => {
          const b = document.createElement("button");
          b.textContent = label;
          b.dataset.y = val;
          b.addEventListener("click", () =>
            setYear(val === "all" ? null : +val),
          );
          wrap.appendChild(b);
        };
        const pg = (label, step, aria) => {
          const b = document.createElement("button");
          b.textContent = label;
          b.className = "pg";
          b.setAttribute("aria-label", aria);
          b.addEventListener("click", () => {
            yrPage = Math.min(maxPage, Math.max(0, yrPage + step));
            buildYears();
          });
          wrap.appendChild(b);
        };
        if (yrPage < maxPage) pg("‹", 1, "Earlier years");
